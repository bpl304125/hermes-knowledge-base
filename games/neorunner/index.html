<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>3D 赛博跑酷 NeoRunner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block}
#ui{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;padding:16px}
#score{text-align:center;font:bold 32px Arial;color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #06f}
#combo{text-align:center;color:#ff0;font:16px Arial;opacity:0;transition:opacity .3s}
#start,#gameover{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;pointer-events:auto}
#start{background:rgba(0,0,0,.8);color:#0ff;border:2px solid #0ff;border-radius:16px;padding:24px 36px;font-size:20px;text-align:center;box-shadow:0 0 30px rgba(0,255,255,.3)}
#start small{display:block;color:#888;font-size:12px;margin-top:8px}
#gameover{background:rgba(0,0,0,.9);color:#fff;border-radius:16px;padding:28px 36px;text-align:center;display:none;border:2px solid #f44}
#gameover h2{color:#f44;font-size:26px}
#gameover .s{font-size:22px;margin:10px 0;color:#0ff}
#gameover button{background:#0ff;color:#000;border:none;border-radius:10px;padding:12px 30px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:8px}
</style>
</head>
<body>

<div id="ui"><div id="score">0</div><div id="combo"></div></div>
<div id="start" onclick="startGame()">🏍️ 赛博跑酷<br><small>← → 滑屏躲避  |  收集能量球</small></div>
<div id="gameover"><h2>💀 信号丢失</h2><div class="s" id="finalScore"></div><button onclick="restartGame()">🔄 重新连接</button></div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160/build/three.module.js"}}
</script>

<script type="module">
import * as THREE from 'three';

const G={running:false,score:0,lane:1,targetLane:1,speed:0.2,obstacles:[],collectibles:[],particles:[],buildings:[]};
const LANES=[-3.5,0,3.5];
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x0a0030,0.00025);

const camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,0.5,200);
camera.position.set(0,6,14);camera.lookAt(0,0,-20);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
document.body.appendChild(renderer.domElement);

// 光照
scene.add(new THREE.AmbientLight(0x1a0a3a,1.5));
const moon=new THREE.DirectionalLight(0x4488ff,4);
moon.position.set(10,20,-5);moon.castShadow=true;
moon.shadow.mapSize.set(1024,1024);moon.shadow.camera.far=80;
moon.shadow.camera.left=-15;moon.shadow.camera.right=15;
moon.shadow.camera.top=15;moon.shadow.camera.bottom=-15;
scene.add(moon);

// 天空繁星
const skyGeo=new THREE.BufferGeometry();
const skyPos=new Float32Array(800*3);
for(let i=0;i<800*3;i+=3){skyPos[i]=(Math.random()-0.5)*60;skyPos[i+1]=Math.random()*30+5;skyPos[i+2]=Math.random()*-150+20;}
skyGeo.setAttribute('position',new THREE.BufferAttribute(skyPos,3));
scene.add(new THREE.Points(skyGeo,new THREE.PointsMaterial({color:0x88aaff,size:0.15,blending:THREE.AdditiveBlending})));

// === 3D 城市建筑 ===
function createBuilding(x,z,w,h,d,color,emissive){
  const g=new THREE.BoxGeometry(w,h,d,2,4,2);
  // 随机窗格发光
  const mat=new THREE.MeshStandardMaterial({color,emissive,emissiveIntensity:0.6,roughness:0.7,metalness:0.3});
  const b=new THREE.Mesh(g,mat);
  b.position.set(x,h/2,z);
  b.castShadow=true;b.receiveShadow=true;
  // 窗户发光条
  for(let floor=1;floor<h/3;floor++){
    if(Math.random()>0.4){
      const wGeo=new THREE.PlaneGeometry(w*0.4,0.5);
      const wMat=new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(0.55+Math.random()*0.2,1,0.5+Math.random()*0.5)});
      const win=new THREE.Mesh(wGeo,wMat);
      win.position.y=-h/2+floor*3+1;
      if(Math.random()>0.5) win.position.z=d/2+0.01; else win.position.z=-d/2-0.01;
      b.add(win);
    }
  }
  // 顶部霓虹
  if(Math.random()>0.3){
    const neo=new THREE.Mesh(new THREE.BoxGeometry(w*0.8,0.3,0.3),new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(Math.random(),1,0.6)}));
    neo.position.y=h/2+0.2;b.add(neo);
  }
  return b;
}

// 道路
const roadGeo=new THREE.PlaneGeometry(10,300);
const roadMat=new THREE.MeshStandardMaterial({color:0x111122,roughness:0.9,metalness:0.2});
const road=new THREE.Mesh(roadGeo,roadMat);
road.rotation.x=-Math.PI/2;road.position.z=-130;road.receiveShadow=true;scene.add(road);

// 车道线
for(let z=20;z>-280;z-=4){
  for(let x=-2;x<=2;x+=2){
    const l=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.05,1.5),new THREE.MeshBasicMaterial({color:0xff00ff}));
    l.position.set(x,0.03,z);scene.add(l);
  }
}

// 路边灯光柱
function createLamp(x,z){
  const g=new THREE.Group();
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.2,6),new THREE.MeshStandardMaterial({color:0x333344,metalness:0.8,roughness:0.3}));
  pole.position.y=3;pole.castShadow=true;g.add(pole);
  const light=new THREE.Mesh(new THREE.SphereGeometry(0.4),new THREE.MeshBasicMaterial({color:0xff66ff}));
  light.position.y=6.2;g.add(light);
  const glow=new THREE.PointLight(0xff66ff,2,8);
  glow.position.y=6.2;g.add(glow);
  g.position.set(x,0,z);scene.add(g);
  return g;
}
for(let z=15;z>-280;z-=30) for(let x of [-4.5,4.5]) createLamp(x,z);

// === 玩家角色 (3D人物) ===
const player=new THREE.Group();
// 躯干
const torso=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,1.2,8),new THREE.MeshStandardMaterial({color:0x0066ff,emissive:0x003388,metalness:0.6,roughness:0.2}));
torso.position.y=0.8;torso.castShadow=true;player.add(torso);
// 头部
const head=new THREE.Mesh(new THREE.SphereGeometry(0.35,16,16),new THREE.MeshStandardMaterial({color:0x112244,emissive:0x001122,metalness:0.8,roughness:0.1}));
head.position.y=1.65;head.castShadow=true;player.add(head);
// 头盔面罩
const visor=new THREE.Mesh(new THREE.SphereGeometry(0.36,16,8,0,Math.PI*2,0,Math.PI/3),new THREE.MeshBasicMaterial({color:0x00ffff,transparent:true,opacity:0.7}));
visor.position.y=1.7;visor.position.z=0.15;player.add(visor);
// 手臂
for(let side of[-1,1]){
  const arm=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.12,1,6),new THREE.MeshStandardMaterial({color:0x0044aa,emissive:0x002266,metalness:0.6,roughness:0.2}));
  arm.position.set(side*0.4,1,0);arm.castShadow=true;player.add(arm);
}
// 腿
for(let side of[-1,1]){
  const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.14,0.8,6),new THREE.MeshStandardMaterial({color:0x112244,metalness:0.5,roughness:0.3}));
  leg.position.set(side*0.18,0.2,0);leg.castShadow=true;player.add(leg);
}
// 光翼
for(let side of[-1,1]){
  const wingGeo=new THREE.ConeGeometry(0.5,1.5,4);
  const wing=new THREE.Mesh(wingGeo,new THREE.MeshBasicMaterial({color:0x00ffff,transparent:true,opacity:0.4,side:THREE.DoubleSide}));
  wing.position.set(side*0.6,1.2,-0.2);wing.rotation.z=side*0.5;player.add(wing);
}
// 地面光环
const ring=new THREE.Mesh(new THREE.TorusGeometry(0.5,0.05,16,32),new THREE.MeshBasicMaterial({color:0x00ffff,transparent:true,opacity:0.6}));
ring.rotation.x=-Math.PI/2;ring.position.y=0.05;player.add(ring);

scene.add(player);

// === 障碍物(3D) ===
function createObstacle(x,z,type){
  const g=new THREE.Group();
  let mesh;
  switch(type){
    case 0:{ // 能量屏障
      mesh=new THREE.Mesh(new THREE.BoxGeometry(1.5,2,0.3),new THREE.MeshStandardMaterial({color:0xff0044,emissive:0x660022,metalness:0.8,roughness:0.1}));
      mesh.position.y=1;break;
    }
    case 1:{ // 激光柱
      mesh=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.5,3,8),new THREE.MeshStandardMaterial({color:0xff4400,emissive:0x441100,metalness:0.5,roughness:0.2}));
      mesh.position.y=1.5;break;
    }
    case 2:{ // 无人机
      const body=new THREE.Mesh(new THREE.SphereGeometry(0.5),new THREE.MeshStandardMaterial({color:0xff8800,emissive:0x441100,metalness:0.9,roughness:0.1}));
      body.position.y=1.5;g.add(body);
      for(let i=0;i<4;i++){
        const p=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.05,0.15),new THREE.MeshStandardMaterial({color:0x444444}));
        p.rotation.y=i*Math.PI/2;p.position.y=1.5;g.add(p);
      }
      mesh=body;break;
    }
  }
  if(mesh&&type<2){mesh.castShadow=true;g.add(mesh);}
  g.position.set(x,0,z);g.userData={type,rot:0};scene.add(g);
  return g;
}

// === 能量球(收集物) ===
function createCollectible(x,z){
  const c=new THREE.Group();
  const core=new THREE.Mesh(new THREE.IcosahedronGeometry(0.35,1),new THREE.MeshStandardMaterial({color:0x00ffcc,emissive:0x00ffaa,emissiveIntensity:2,metalness:0.3,roughness:0.1}));
  c.add(core);
  const glow2=new THREE.Mesh(new THREE.IcosahedronGeometry(0.5,1),new THREE.MeshBasicMaterial({color:0x00ffff,transparent:true,opacity:0.3}));
  c.add(glow2);
  c.position.set(x,1.5,z);
  scene.add(c);
  return c;
}

// 爆炸粒子
function explode(x,y,z,color){
  for(let i=0;i<25;i++){
    const p=new THREE.Mesh(new THREE.SphereGeometry(0.08),new THREE.MeshBasicMaterial({color}));
    p.position.set(x,y,z);
    p.userData={vx:(Math.random()-0.5)*5,vy:Math.random()*5+2,vz:(Math.random()-0.5)*5+2,life:1};
    scene.add(p);G.particles.push(p);
  }
}

// === 游戏逻辑 ===
let spawnT=0,collectT=0,frame=0;

function spawnObstacle(){
  const lane=LANES[Math.floor(Math.random()*3)];
  const type=Math.floor(Math.random()*3);
  G.obstacles.push(createObstacle(lane,-50,type));
}

function gameLoop(){
  if(!G.running)return;frame++;
  G.speed=0.2+G.score*0.004;

  // 玩家移动
  const tx=LANES[G.targetLane];
  player.position.x+=(tx-player.position.x)*0.12;
  player.position.y=Math.sin(frame*0.05)*0.15;

  // 城市建筑动态生成
  if(frame%40===0){
    for(let side of[-1,1]){
      const bw=2+Math.random()*5,bh=5+Math.random()*25,bd=2+Math.random()*4;
      const hue=0.55+Math.random()*0.3;
      const b=createBuilding(side*(6+bw/2),-60,bw,bh,bd,new THREE.Color().setHSL(hue,0.3,0.1),new THREE.Color().setHSL(hue,0.8,0.3));
      G.buildings.push({mesh:b,pos:-60});
    }
  }

  // 更新建筑(移动+回收)
  for(let i=G.buildings.length-1;i>=0;i--){
    G.buildings[i].pos+=G.speed;
    G.buildings[i].mesh.position.z=G.buildings[i].pos;
    if(G.buildings[i].pos>15){scene.remove(G.buildings[i].mesh);G.buildings.splice(i,1);}
  }

  // 生成
  if(++spawnT>Math.max(12,55-G.score*0.25)){spawnObstacle();spawnT=0;}
  if(++collectT>70){G.collectibles.push(createCollectible(LANES[Math.floor(Math.random()*3)],-50));collectT=0;}

  // 道路滚动
  road.position.z+=G.speed;if(road.position.z>20)road.position.z=-130;

  // 障碍物
  for(let i=G.obstacles.length-1;i>=0;i--){
    const o=G.obstacles[i];
    o.position.z+=G.speed;
    o.userData.rot+=0.05;o.rotation.y=o.userData.rot;
    if(Math.abs(o.position.z-player.position.z)<1.2&&Math.abs(o.position.x-player.position.x)<1.5){
      gameOver();return;
    }
    if(o.position.z>5){scene.remove(o);G.obstacles.splice(i,1);G.score+=5;updateScore();}
  }
  // 收集物
  for(let i=G.collectibles.length-1;i>=0;i--){
    const c=G.collectibles[i];
    c.position.z+=G.speed;c.rotation.y+=0.08;c.rotation.x+=0.05;
    if(Math.abs(c.position.z-player.position.z)<1&&Math.abs(c.position.x-player.position.x)<1.2){
      explode(c.position.x,c.position.y,c.position.z,0x00ffff);
      scene.remove(c);G.collectibles.splice(i,1);G.score+=30;updateScore();
    }else if(c.position.z>5){scene.remove(c);G.collectibles.splice(i,1);}
  }
  // 粒子
  for(let i=G.particles.length-1;i>=0;i--){
    const p=G.particles[i];
    p.position.x+=p.userData.vx*0.03;p.position.y+=p.userData.vy*0.03;p.position.z+=p.userData.vz*0.03;
    p.userData.life-=0.015;
    p.material.opacity=p.userData.life;
    if(p.userData.life<=0){scene.remove(p);G.particles.splice(i,1);}
  }
  // 光环动画
  ring.scale.setScalar(1+Math.sin(frame*0.1)*0.2);
  ring.material.opacity=0.4+Math.sin(frame*0.15)*0.2;

  requestAnimationFrame(gameLoop);
}

function updateScore(){document.getElementById('score').textContent=G.score;}
function gameOver(){
  G.running=false;
  explode(player.position.x,1.5,player.position.z,0xff0044);
  document.getElementById('gameover').style.display='block';
  document.getElementById('finalScore').textContent='🏆 '+G.score+' 分';
}

// 渲染
function animate(){
  renderer.render(scene,camera);
  if(G.running){
    camera.position.x+=(player.position.x*0.3-camera.position.x)*0.03;
    // 低位相机跟踪
    camera.position.z=player.position.z+14;
    camera.lookAt(player.position.x,2,player.position.z-10);
  }
  requestAnimationFrame(animate);
}animate();

// 控制
let tsX=0;
window.addEventListener('touchstart',e=>{tsX=e.touches[0].clientX});
window.addEventListener('touchend',e=>{
  if(!G.running)return;
  const dx=e.changedTouches[0].clientX-tsX;
  if(dx>25)G.targetLane=Math.min(2,G.targetLane+1);
  else if(dx<-25)G.targetLane=Math.max(0,G.targetLane-1);
});
window.addEventListener('keydown',e=>{
  if(!G.running)return;
  if(e.key==='ArrowLeft'||e.key==='a')G.targetLane=Math.max(0,G.targetLane-1);
  if(e.key==='ArrowRight'||e.key==='d')G.targetLane=Math.min(2,G.targetLane+1);
});

// 开始/重启
window.startGame=function(){
  document.getElementById('start').style.display='none';
  document.getElementById('gameover').style.display='none';
  G.running=true;G.score=0;G.lane=1;G.targetLane=1;G.speed=0.2;
  spawnT=0;collectT=0;frame=0;
  player.position.set(0,0,0);
  G.obstacles.forEach(o=>scene.remove(o));G.obstacles=[];
  G.collectibles.forEach(c=>scene.remove(c));G.collectibles=[];
  G.particles.forEach(p=>scene.remove(p));G.particles=[];
  G.buildings.forEach(b=>scene.remove(b.mesh));G.buildings=[];
  updateScore();gameLoop();
};
window.restartGame=function(){
  G.obstacles.forEach(o=>scene.remove(o));G.obstacles=[];
  G.collectibles.forEach(c=>scene.remove(c));G.collectibles=[];
  G.particles.forEach(p=>scene.remove(p));G.particles=[];
  G.buildings.forEach(b=>scene.remove(b.mesh));G.buildings=[];
  document.getElementById('gameover').style.display='none';
  G.running=true;G.score=0;G.targetLane=1;
  spawnT=0;collectT=0;frame=0;
  player.position.set(0,0,0);
  updateScore();gameLoop();
};

// 响应式
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
