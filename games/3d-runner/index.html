<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,maximum-scale=1.0">
<title>3D 无尽跑酷 - 抖音小游戏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a2e;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block}
#ui{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:10;padding:12px}
#score{font-family:'Arial',sans-serif;font-size:28px;font-weight:bold;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.6);text-align:center}
#combo{font-size:16px;color:#ffdd57;text-align:center;opacity:0;transition:opacity .3s}
#start{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.7);color:#fff;border:2px solid #6c5ce7;border-radius:20px;padding:20px 40px;font-size:22px;cursor:pointer;z-index:20;pointer-events:auto;text-align:center}
#start small{display:block;font-size:13px;color:#aaa;margin-top:8px}
#gameover{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);color:#fff;border-radius:20px;padding:24px 32px;text-align:center;z-index:20;display:none;pointer-events:auto}
#gameover h2{font-size:28px;color:#ff6b6b;margin-bottom:8px}
#gameover .final{font-size:20px;margin:8px 0}
#gameover button{background:#6c5ce7;color:#fff;border:none;border-radius:12px;padding:12px 32px;font-size:18px;margin-top:12px;cursor:pointer}
</style>
</head>
<body>

<div id="ui"><div id="score">0</div><div id="combo"></div></div>
<div id="start" onclick="startGame()">
  🎮 3D 无尽跑酷<br><small>← 左滑 / 右滑 → 躲避障碍</small>
</div>
<div id="gameover">
  <h2>💥 游戏结束</h2>
  <div class="final" id="finalScore"></div>
  <button onclick="restartGame()">🔄 再来一局</button>
</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160/build/three.module.js"}}
</script>

<script type="module">
import * as THREE from 'three';

// === 游戏状态 ===
const LANES = [-2, 0, 2];
const GAME = {
  running: false, score: 0, combo: 0,
  speed: 0.15, currentLane: 1, targetLane: 1,
  obstacles: [], particles: []
};

// === Three.js 初始化 ===
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);
scene.fog = new THREE.Fog(0x0a0a2e, 10, 40);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.5, 100);
camera.position.set(0, 4, 10);
camera.lookAt(0, 0, -10);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// 光照
const ambient = new THREE.AmbientLight(0x404060, 2);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 3);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(512, 512);
scene.add(dirLight);

// 地面
const groundGeo = new THREE.PlaneGeometry(20, 200);
const groundMat = new THREE.MeshStandardMaterial({color:0x1a1a4e,roughness:0.8});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.position.z = -80;
ground.receiveShadow = true;
scene.add(ground);

// 跑道线
for(let z=10; z>-120; z-=3){
  for(let x of LANES){
    const lineGeo = new THREE.BoxGeometry(0.08, 0.05, 1.5);
    const line = new THREE.Mesh(lineGeo, new THREE.MeshStandardMaterial({color:0x6c5ce7,emissive:0x2d1b69}));
    line.position.set(x, 0.05, z);
    line.receiveShadow = true;
    scene.add(line);
  }
}

// 背景粒子
const starsGeo = new THREE.BufferGeometry();
const starsCount = 300;
const starsPos = new Float32Array(starsCount*3);
for(let i=0;i<starsCount*3;i+=3){
  starsPos[i]=(Math.random()-0.5)*30;
  starsPos[i+1]=Math.random()*15+2;
  starsPos[i+2]=Math.random()*-100;
}
starsGeo.setAttribute('position',new THREE.BufferAttribute(starsPos,3));
const stars = new THREE.Points(starsGeo,new THREE.PointsMaterial({color:0x6c5ce7,size:0.1}));
scene.add(stars);

// === 玩家 ===
const playerGroup = new THREE.Group();
// 身体
const bodyGeo = new THREE.BoxGeometry(0.8, 0.6, 0.4);
const bodyMat = new THREE.MeshStandardMaterial({color:0x6c5ce7,emissive:0x2d1b69,metalness:0.3,roughness:0.4});
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.position.y = 0.6;
body.castShadow = true;
playerGroup.add(body);
// 头
const headGeo = new THREE.SphereGeometry(0.3);
const head = new THREE.Mesh(headGeo, bodyMat);
head.position.y = 1.2;
head.castShadow = true;
playerGroup.add(head);
// 光晕
const glowGeo = new THREE.RingGeometry(0.5, 0.7, 32);
const glow = new THREE.Mesh(glowGeo, new THREE.MeshBasicMaterial({color:0x6c5ce7,side:THREE.DoubleSide,transparent:true,opacity:0.5}));
glow.rotation.x = -Math.PI/2;
glow.position.y = 0.02;
playerGroup.add(glow);

scene.add(playerGroup);

// === 障碍物创建 ===
function createObstacle(x, z, type='box'){
  const group = new THREE.Group();
  let mesh;
  if(type==='box'){
    mesh = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 1.2, 1.2),
      new THREE.MeshStandardMaterial({color:0xff6b6b,emissive:0x4a0000,roughness:0.3})
    );
  } else {
    mesh = new THREE.Mesh(
      new THREE.ConeGeometry(0.6, 1.4, 6),
      new THREE.MeshStandardMaterial({color:0xffa502,emissive:0x4a2000,roughness:0.3})
    );
  }
  mesh.position.y = type==='box'?0.6:0.7;
  mesh.castShadow = true;
  group.add(mesh);
  group.position.set(x, 0, z);
  scene.add(group);
  return {mesh:group, type};
}

// === 收集物 ===
function createCollectible(x, z){
  const geo = new THREE.OctahedronGeometry(0.3);
  const mat = new THREE.MeshStandardMaterial({color:0x00d2ff,emissive:0x003a4a,metalness:0.8,roughness:0.2});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, 1.2, z);
  mesh.castShadow = true;
  scene.add(mesh);
  return mesh;
}

// === 粒子特效 ===
function spawnParticles(x, y, z, color=0xff6b6b){
  for(let i=0;i<15;i++){
    const geo = new THREE.SphereGeometry(0.08);
    const mat = new THREE.MeshBasicMaterial({color,transparent:true});
    const p = new THREE.Mesh(geo, mat);
    p.position.set(x, y, z);
    p.userData = {
      vx:(Math.random()-0.5)*2, vy:Math.random()*3+1, vz:(Math.random()-0.5)*2,
      life:1, decay:0.02+Math.random()*0.03
    };
    scene.add(p);
    GAME.particles.push(p);
  }
}

// === 游戏逻辑 ===
let spawnTimer = 0;
let collectibleTimer = 0;
const collectibles = [];

function spawnObstacle(){
  const lane = LANES[Math.floor(Math.random()*3)];
  const type = Math.random()>0.6?'cone':'box';
  GAME.obstacles.push(createObstacle(lane, -30, type));
}

function spawnCollectible(){
  const lane = LANES[Math.floor(Math.random()*3)];
  collectibles.push(createCollectible(lane, -30));
}

function gameLoop(){
  if(!GAME.running) return;

  GAME.speed = 0.15 + GAME.score * 0.002;

  // 玩家平滑移动
  const targetX = LANES[GAME.targetLane];
  playerGroup.position.x += (targetX - playerGroup.position.x) * 0.15;

  // 生成障碍
  spawnTimer++;
  if(spawnTimer > Math.max(15, 60 - GAME.score*0.3)){
    spawnObstacle();
    spawnTimer = 0;
  }

  // 生成收集物
  collectibleTimer++;
  if(collectibleTimer > 80){
    spawnCollectible();
    collectibleTimer = 0;
  }

  // 移动障碍和收集物
  for(let i=GAME.obstacles.length-1;i>=0;i--){
    const obs = GAME.obstacles[i];
    obs.mesh.position.z += GAME.speed;

    // 碰撞检测
    if(Math.abs(obs.mesh.position.z - playerGroup.position.z)<0.8 &&
       Math.abs(obs.mesh.position.x - playerGroup.position.x)<1.0){
      gameOver();
      return;
    }

    if(obs.mesh.position.z > 5){
      scene.remove(obs.mesh);
      GAME.obstacles.splice(i,1);
      GAME.score += 10;
      GAME.combo++;
      updateScore();
    }
  }

  for(let i=collectibles.length-1;i>=0;i--){
    const c = collectibles[i];
    c.position.z += GAME.speed;
    c.rotation.y += 0.05;
    if(Math.abs(c.position.z - playerGroup.position.z)<0.8 &&
       Math.abs(c.position.x - playerGroup.position.x)<1.0){
      scene.remove(c);
      collectibles.splice(i,1);
      GAME.score += 50;
      GAME.combo += 3;
      spawnParticles(c.position.x, c.position.y, c.position.z, 0x00d2ff);
      updateScore();
    } else if(c.position.z > 5){
      scene.remove(c);
      collectibles.splice(i,1);
    }
  }

  // 粒子更新
  for(let i=GAME.particles.length-1;i>=0;i--){
    const p = GAME.particles[i];
    p.position.x += p.userData.vx * 0.05;
    p.position.y += p.userData.vy * 0.05;
    p.position.z += p.userData.vz * 0.05;
    p.userData.life -= p.userData.decay;
    p.material.opacity = p.userData.life;
    if(p.userData.life <= 0){
      scene.remove(p);
      GAME.particles.splice(i,1);
    }
  }

  // 地面滚动
  ground.position.z += GAME.speed;
  if(ground.position.z > 20) ground.position.z = -80;

  // 星星移动
  const pos = stars.geometry.attributes.position.array;
  for(let i=2;i<pos.length;i+=3){
    pos[i] += GAME.speed;
    if(pos[i] > 5) pos[i] = -95;
  }
  stars.geometry.attributes.position.needsUpdate = true;

  // 光晕旋转
  glow.rotation.z += 0.03;
  playerGroup.position.y = Math.sin(Date.now()*0.003)*0.1;

  // 相机跟随
  camera.position.x += (playerGroup.position.x*0.3 - camera.position.x)*0.05;

  requestAnimationFrame(gameLoop);
}

function updateScore(){
  document.getElementById('score').textContent = GAME.score;
}

function gameOver(){
  GAME.running = false;
  spawnParticles(playerGroup.position.x, 1, playerGroup.position.z);
  document.getElementById('gameover').style.display = 'block';
  document.getElementById('finalScore').textContent = `🏆 ${GAME.score} 分`;
}

// === 渲染循环 ===
function animate(){
  renderer.render(scene, camera);
  if(GAME.running){
    camera.position.z = playerGroup.position.z + 10;
  }
  requestAnimationFrame(animate);
}
animate();

// === 控制 ===
let touchStartX = 0;
window.addEventListener('touchstart', e=>{ touchStartX = e.touches[0].clientX; });
window.addEventListener('touchend', e=>{
  if(!GAME.running) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(dx > 30) GAME.targetLane = Math.min(2, GAME.targetLane+1);
  else if(dx < -30) GAME.targetLane = Math.max(0, GAME.targetLane-1);
});

window.addEventListener('keydown', e=>{
  if(!GAME.running) return;
  if(e.key==='ArrowLeft'||e.key==='a') GAME.targetLane = Math.max(0, GAME.targetLane-1);
  if(e.key==='ArrowRight'||e.key==='d') GAME.targetLane = Math.min(2, GAME.targetLane+1);
});

// === 开始/重启 ===
window.startGame = function(){
  document.getElementById('start').style.display = 'none';
  document.getElementById('gameover').style.display = 'none';
  GAME.running = true; GAME.score = 0; GAME.combo = 0;
  GAME.speed = 0.15; GAME.currentLane = 1; GAME.targetLane = 1;
  spawnTimer = 0; collectibleTimer = 0;
  playerGroup.position.set(0, 0, 0);
  updateScore();
  gameLoop();
};

window.restartGame = function(){
  // 清理
  GAME.obstacles.forEach(o=>scene.remove(o.mesh));
  GAME.obstacles = [];
  collectibles.forEach(c=>scene.remove(c));
  collectibles.length = 0;
  GAME.particles.forEach(p=>scene.remove(p));
  GAME.particles = [];
  document.getElementById('gameover').style.display = 'none';
  GAME.running = true; GAME.score = 0; GAME.combo = 0;
  GAME.speed = 0.15; GAME.currentLane = 1; GAME.targetLane = 1;
  spawnTimer = 0; collectibleTimer = 0;
  playerGroup.position.set(0, 0, 0);
  updateScore();
  gameLoop();
};
</script>
</body>
</html>
