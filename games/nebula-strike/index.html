<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Nebula Strike - 3D 星际战机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none}canvas{display:block}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;display:flex;justify-content:space-between;padding:16px 24px;font:bold 18px monospace}
#hud span{color:#0ff;text-shadow:0 0 10px #0ff}
#lives{color:#f44!important}
.overlay{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;pointer-events:auto}
.screen{background:rgba(0,0,20,.9);border:2px solid #0ff;border-radius:24px;padding:40px 50px;text-align:center;color:#fff;box-shadow:0 0 60px rgba(0,255,255,.3)}
.screen h1{font-size:3em;background:linear-gradient(180deg,#0ff,#06f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.screen h2{color:#f80;font-size:1.5em;margin-bottom:16px}
.screen p{color:#aaa;margin:8px 0;font-size:14px}
.screen button{background:#0ff;color:#000;border:none;border-radius:12px;padding:14px 40px;font:bold 18px Arial;cursor:pointer;margin-top:16px}
.screen button:hover{background:#fff;box-shadow:0 0 30px #0ff}
.controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:30;display:flex;gap:60px}
.ctrl-btn{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;pointer-events:auto;touch-action:manipulation}
.ctrl-btn:active{background:rgba(0,255,255,.3)}
</style></head>
<body>

<div id="hud"><span>🏆 <b id="score">0</b></span><span id="wave">WAVE 1</span><span id="lives">❤️❤️❤️</span><span>⚡ <b id="power">0</b></span></div>

<div id="titleScreen" class="overlay"><div class="screen">
<h1>NEBULA STRIKE</h1><h2>星际战机</h2>
<p>🚀 驾驶星际战机，守护银河系</p><p>⬆️⬇️⬅️➡️ 移动 | 🔥 自动射击 | 💎 收集能量</p>
<button onclick="startGame()">⚔️ 出击</button>
</div></div>

<div id="gameoverScreen" class="overlay" style="display:none"><div class="screen">
<h2 style="color:#f44">💥 战机坠毁</h2><p style="font-size:1.5em;color:#0ff" id="finalScore"></p>
<p id="finalWave"></p><button onclick="restartGame()">🔄 重新出击</button>
</div></div>

<div class="controls" id="mobileControls">
<div class="ctrl-btn" ontouchstart="moveDir(0,-1)" ontouchend="moveDir(0,0)">⬆️</div>
<div style="display:flex;gap:60px">
<div class="ctrl-btn" ontouchstart="moveDir(-1,0)" ontouchend="moveDir(0,0)">⬅️</div>
<div class="ctrl-btn" ontouchstart="moveDir(1,0)" ontouchend="moveDir(0,0)">➡️</div></div>
<div class="ctrl-btn" ontouchstart="moveDir(0,1)" ontouchend="moveDir(0,0)">⬇️</div>
</div>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

// === 游戏状态 ===
const S={score:0,wave:1,lives:3,power:0,gameOver:true,paused:false,
  enemies:[],bullets:[],enemyBullets:[],particles:[],powerups:[],stars:[],
  playerX:0,playerY:0,moveX:0,moveY:0,shootTimer:0,spawnTimer:0,powerSpawnTimer:0,
  bgmNodes:[],bossActive:false,bossHP:0
};

// === Three.js ===
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x000011);
scene.fog=new THREE.FogExp2(0x000022,0.00015);
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.5,200);
camera.position.set(0,3,20);camera.lookAt(0,0,-30);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);

// 光照
scene.add(new THREE.AmbientLight(0x112244,2));
const sun=new THREE.DirectionalLight(0x4488ff,3);
sun.position.set(0,20,-20);scene.add(sun);

// 星空
const starsGeo=new THREE.BufferGeometry();
const sc=1500,sp=new Float32Array(sc*3);
for(let i=0;i<sc*3;i+=3){sp[i]=(Math.random()-0.5)*80;sp[i+1]=(Math.random()-0.5)*60;sp[i+2]=Math.random()*-120-10;}
starsGeo.setAttribute('position',new THREE.BufferAttribute(sp,3));
const starsMesh=new THREE.Points(starsGeo,new THREE.PointsMaterial({color:0x8899cc,size:0.08,blending:THREE.AdditiveBlending}));
scene.add(starsMesh);

// 星云环
for(let i=0;i<5;i++){
  const tr=new THREE.TorusGeometry(15+i*8,0.5,16,80);
  const tm=new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(0.55+i*0.05,0.8,0.2),transparent:true,opacity:0.15,side:THREE.DoubleSide});
  const t=new THREE.Mesh(tr,tm);
  t.rotation.x=Math.PI/2+i*0.3;t.position.z=-60-i*15;scene.add(t);
}

// 玩家战机
const player=new THREE.Group();
// 机身
const bodyGeo=new THREE.ConeGeometry(0.4,2,6);bodyGeo.rotateX(Math.PI/2);
const body=new THREE.Mesh(bodyGeo,new THREE.MeshStandardMaterial({color:0x3366ff,emissive:0x1133aa,metalness:0.8,roughness:0.2}));
body.castShadow=true;player.add(body);
// 机翼
for(let s of[-1,1]){
  const w=new THREE.Mesh(new THREE.BoxGeometry(1.8,0.08,0.5),new THREE.MeshStandardMaterial({color:0x2244cc,emissive:0x112266,metalness:0.6}));
  w.position.set(s*0.7,-0.1,0.2);w.castShadow=true;player.add(w);
}
// 引擎光
const engineGlow=new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.35,1,8),new THREE.MeshBasicMaterial({color:0x00aaff,transparent:true,opacity:0.8}));
engineGlow.position.z=1.2;player.add(engineGlow);
const engLight=new THREE.PointLight(0x0066ff,3,4);engLight.position.z=1.5;player.add(engLight);
// 驾驶舱
const cockpit=new THREE.Mesh(new THREE.SphereGeometry(0.3,8,8),new THREE.MeshBasicMaterial({color:0x88ccff,transparent:true,opacity:0.6}));
cockpit.position.z=-0.3;cockpit.position.y=0.15;player.add(cockpit);
player.position.set(0,0,-5);
scene.add(player);

// === 工厂函数 ===
function createBullet(x,y,z,color=0x00ffff,vel=1.2){
  const b=new THREE.Group();
  const core=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,0.6,6),new THREE.MeshBasicMaterial({color}));
  core.rotation.x=Math.PI/2;b.add(core);
  const glow=new THREE.PointLight(color,1,3);b.add(glow);
  b.position.set(x,y,z);b.userData={vel};
  scene.add(b);return b;
}
function createEnemy(x,y,z,type=0,hp=1){
  const e=new THREE.Group();
  if(type===0){ // 侦察机
    e.add(new THREE.Mesh(new THREE.ConeGeometry(0.5,1,5),new THREE.MeshStandardMaterial({color:0xff4422,emissive:0x441100})));
  }else if(type===1){ // 重型机
    e.add(new THREE.Mesh(new THREE.BoxGeometry(1,0.8,1.5),new THREE.MeshStandardMaterial({color:0xff6600,emissive:0x331100})));
  }else{ // BOSS
    e.add(new THREE.Mesh(new THREE.IcosahedronGeometry(2,1),new THREE.MeshStandardMaterial({color:0xff0000,emissive:0x440000,metalness:0.9})));
    const ring=new THREE.Mesh(new THREE.TorusGeometry(2.5,0.2,8,32),new THREE.MeshBasicMaterial({color:0xff4400}));
    ring.rotation.x=Math.PI/2;e.add(ring);
  }
  e.position.set(x,y,z);e.userData={type,hp:type===2?S.wave*15+20:hp,shootTimer:0};
  scene.add(e);return e;
}
function spawnParticles(x,y,z,color,n=20){
  for(let i=0;i<n;i++){
    const p=new THREE.Mesh(new THREE.SphereGeometry(0.06),new THREE.MeshBasicMaterial({color,transparent:true}));
    p.position.set(x,y,z);p.userData={vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,vz:(Math.random()-0.5)*3+1,life:1};
    scene.add(p);S.particles.push(p);
  }
}
function createPowerup(x,y,z){
  const pu=new THREE.Group();
  const gem=new THREE.Mesh(new THREE.OctahedronGeometry(0.4),new THREE.MeshStandardMaterial({color:0xffdd00,emissive:0x664400,metalness:0.5}));
  pu.add(gem);
  const g2=new THREE.Mesh(new THREE.OctahedronGeometry(0.55),new THREE.MeshBasicMaterial({color:0xffaa00,transparent:true,opacity:0.4}));
  pu.add(g2);
  pu.position.set(x,y,z);scene.add(pu);
  return pu;
}

// === Web Audio ===
const ctx=new(window.AudioContext||window.webkitAudioContext)();
function playSFX(freq,type='square',dur=0.1,vol=0.1){
  const o=ctx.createOscillator();const g=ctx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
  o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+dur);
}
function sfxShoot(){playSFX(800,'square',0.08,0.08)}
function sfxHit(){playSFX(150,'sawtooth',0.2,0.15)}
function sfxExplode(){playSFX(60,'sawtooth',0.5,0.25);playSFX(200,'square',0.3,0.15)}
function sfxPowerup(){playSFX(600,'sine',0.1,0.1);setTimeout(()=>playSFX(900,'sine',0.1,0.1),100);setTimeout(()=>playSFX(1200,'sine',0.15,0.1),200)}

let bgmInterval=null;
function startBGM(){
  if(bgmInterval)return;
  let beat=0;
  const bass=[110,110,165,110,147,147,165,147];
  bgmInterval=setInterval(()=>{
    const o=ctx.createOscillator();const g=ctx.createGain();
    o.type='sawtooth';o.frequency.value=bass[beat%8];
    g.gain.setValueAtTime(0.04,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
    o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+0.2);
    if(beat%2===0){playSFX(40,'sine',0.15,0.05)}
    beat++;
  },250);
}
function stopBGM(){if(bgmInterval){clearInterval(bgmInterval);bgmInterval=null}}

// === 游戏循环 ===
let frame=0,difficulty=1;
function update(){
  if(S.gameOver)return;frame++;difficulty=1+S.wave*0.3;

  // 玩家移动
  S.playerX+=S.moveX*0.3;S.playerY+=S.moveY*0.2;
  S.playerX=Math.max(-8,Math.min(8,S.playerX));
  S.playerY=Math.max(-5,Math.min(5,S.playerY));
  player.position.x=S.playerX;player.position.y=S.playerY;

  // 自动射击
  S.shootTimer++;
  const shootRate=Math.max(3,12-S.power*0.5);
  if(S.shootTimer>shootRate){
    S.bullets.push(createBullet(S.playerX,S.playerY,player.position.z+1.5,0x00ffff,1.5));
    if(S.power>5)S.bullets.push(createBullet(S.playerX+0.4,S.playerY,player.position.z+1.5,0x00ffff,1.5));
    if(S.power>5)S.bullets.push(createBullet(S.playerX-0.4,S.playerY,player.position.z+1.5,0x00ffff,1.5));
    if(S.power>10)S.bullets.push(createBullet(S.playerX+0.2,S.playerY+0.4,player.position.z+1.5,0x00ffff,1.5));
    if(S.power>10)S.bullets.push(createBullet(S.playerX-0.2,S.playerY-0.4,player.position.z+1.5,0x00ffff,1.5));
    S.shootTimer=0;sfxShoot();
  }

  // 生成敌人
  S.spawnTimer++;
  const spawnRate=Math.max(20,80-difficulty*5);
  if(S.spawnTimer>spawnRate){
    const ex=(Math.random()-0.5)*14,ey=(Math.random()-0.5)*8;
    const type=Math.random()<0.2?1:0;
    S.enemies.push(createEnemy(ex,ey,-40,type,type+1));
    S.spawnTimer=0;
  }

  // BOSS 每5波
  if(S.wave%5===0&&!S.bossActive&&S.enemies.length===0&&S.spawnTimer>60){
    S.bossActive=true;S.bossHP=S.wave*15+30;
    S.enemies.push(createEnemy(0,0,-45,2,S.bossHP));
  }

  // 道具
  S.powerSpawnTimer++;
  if(S.powerSpawnTimer>200){S.powerups.push(createPowerup((Math.random()-0.5)*12,(Math.random()-0.5)*6,-40));S.powerSpawnTimer=0;}

  // 更新子弹
  for(let i=S.bullets.length-1;i>=0;i--){
    S.bullets[i].position.z-=S.bullets[i].userData.vel;
    if(S.bullets[i].position.z<-45){scene.remove(S.bullets[i]);S.bullets.splice(i,1);}
  }
  // 敌弹
  for(let i=S.enemyBullets.length-1;i>=0;i--){
    S.enemyBullets[i].position.z+=S.enemyBullets[i].userData.vel;
    // 击中玩家
    if(Math.abs(S.enemyBullets[i].position.x-S.playerX)<0.8&&Math.abs(S.enemyBullets[i].position.y-S.playerY)<0.8&&Math.abs(S.enemyBullets[i].position.z-player.position.z)<1){
      hitPlayer();scene.remove(S.enemyBullets[i]);S.enemyBullets.splice(i,1);continue;
    }
    if(S.enemyBullets[i].position.z>10){scene.remove(S.enemyBullets[i]);S.enemyBullets.splice(i,1);}
  }

  // 敌人AI
  for(let i=S.enemies.length-1;i>=0;i--){
    const e=S.enemies[i];
    e.position.z+=0.1*difficulty;
    if(!S.bossActive&&!e.userData.type)e.rotation.z+=0.03;
    if(e.userData.type===2){e.rotation.y+=0.01;e.rotation.x+=0.005}

    // 敌人射击
    e.userData.shootTimer++;
    const erate=e.userData.type===2?8:60;
    if(e.userData.shootTimer>erate&&e.position.z<-20){
      S.enemyBullets.push(createBullet(e.position.x,e.position.y,e.position.z-1,0xff4422,0.5));
      e.userData.shootTimer=0;
    }

    // 碰撞检测
    for(let j=S.bullets.length-1;j>=0;j--){
      if(Math.abs(S.bullets[j].position.x-e.position.x)<1.2&&Math.abs(S.bullets[j].position.y-e.position.y)<1.2&&Math.abs(S.bullets[j].position.z-e.position.z)<1.5){
        e.userData.hp--;scene.remove(S.bullets[j]);S.bullets.splice(j,1);
        spawnParticles(S.bullets[j]?.position.x||e.position.x,S.bullets[j]?.position.y||e.position.y,S.bullets[j]?.position.z||e.position.z,0xffaa00,5);
        if(e.userData.hp<=0){
          spawnParticles(e.position.x,e.position.y,e.position.z,0xff4400,30);
          scene.remove(e);S.enemies.splice(i,1);
          S.score+=e.userData.type===2?500:e.userData.type===1?50:20;
          sfxExplode();
          if(e.userData.type===2){S.bossActive=false;S.wave++;}
          updateHUD();
          break;
        }else{sfxHit();}
      }
    }
    if(i<0)continue;

    // 撞到玩家
    if(Math.abs(e.position.x-S.playerX)<1.2&&Math.abs(e.position.y-S.playerY)<1.2&&Math.abs(e.position.z-player.position.z)<1.5){
      hitPlayer();spawnParticles(e.position.x,e.position.y,e.position.z,0xff0000,20);
      scene.remove(e);S.enemies.splice(i,1);
    }else if(e.position.z>10&&!e.userData.type===2){scene.remove(e);S.enemies.splice(i,1);}
  }

  // 道具
  for(let i=S.powerups.length-1;i>=0;i--){
    const p=S.powerups[i];p.position.z+=0.15;p.rotation.y+=0.05;
    if(Math.abs(p.position.x-S.playerX)<1.2&&Math.abs(p.position.y-S.playerY)<1.2&&Math.abs(p.position.z-player.position.z)<1.5){
      S.power=Math.min(15,S.power+1);S.score+=10;sfxPowerup();
      spawnParticles(p.position.x,p.position.y,p.position.z,0xffdd00,15);
      scene.remove(p);S.powerups.splice(i,1);updateHUD();
    }else if(p.position.z>10){scene.remove(p);S.powerups.splice(i,1);}
  }

  // 粒子
  for(let i=S.particles.length-1;i>=0;i--){
    const p=S.particles[i];
    p.position.x+=p.userData.vx*0.04;p.position.y+=p.userData.vy*0.04;p.position.z+=p.userData.vz*0.04;
    p.userData.life-=0.02;p.material.opacity=p.userData.life;
    if(p.userData.life<=0){scene.remove(p);S.particles.splice(i,1);}
  }

  // Wave check
  if(!S.bossActive&&S.enemies.length===0&&S.spawnTimer>100){
    S.wave++;S.spawnTimer=0;updateHUD();
  }

  // 星星滚动
  const pos=starsMesh.geometry.attributes.position.array;
  for(let i=2;i<pos.length;i+=3){pos[i]+=0.08;if(pos[i]>10)pos[i]=-100;}
  starsMesh.geometry.attributes.position.needsUpdate=true;
}

function hitPlayer(){
  S.lives--;S.power=Math.max(0,S.power-3);
  spawnParticles(player.position.x,player.position.y,player.position.z,0xff0000,40);
  updateHUD();
  if(S.lives<=0)gameOver();
}

function updateHUD(){
  document.getElementById('score').textContent=S.score;
  document.getElementById('wave').textContent=`WAVE ${S.wave}`;
  document.getElementById('lives').textContent='❤️'.repeat(S.lives);
  document.getElementById('power').textContent=S.power;
}

function gameOver(){
  S.gameOver=true;stopBGM();
  document.getElementById('gameoverScreen').style.display='flex';
  document.getElementById('finalScore').textContent=`🏆 ${S.score} 分`;
  document.getElementById('finalWave').textContent=`到达第 ${S.wave} 波`;
}

// 移动方向
window.moveDir=function(x,y){S.moveX=x;S.moveY=y;}

// 键盘
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')S.moveX=-1;
  if(e.key==='ArrowRight'||e.key==='d')S.moveX=1;
  if(e.key==='ArrowUp'||e.key==='w')S.moveY=1;
  if(e.key==='ArrowDown'||e.key==='s')S.moveY=-1;
});
window.addEventListener('keyup',e=>{
  if(['ArrowLeft','ArrowRight','a','d'].includes(e.key))S.moveX=0;
  if(['ArrowUp','ArrowDown','w','s'].includes(e.key))S.moveY=0;
});

window.startGame=function(){
  document.getElementById('titleScreen').style.display='none';
  document.getElementById('gameoverScreen').style.display='none';
  S.score=0;S.wave=1;S.lives=3;S.power=0;S.gameOver=false;S.bossActive=false;
  S.playerX=0;S.playerY=0;S.moveX=0;S.moveY=0;
  S.enemies.forEach(e=>scene.remove(e));S.enemies=[];
  S.bullets.forEach(b=>scene.remove(b));S.bullets=[];
  S.enemyBullets.forEach(b=>scene.remove(b));S.enemyBullets=[];
  S.particles.forEach(p=>scene.remove(p));S.particles=[];
  S.powerups.forEach(p=>scene.remove(p));S.powerups=[];
  player.position.set(0,0,-5);
  updateHUD();startBGM();
};

window.restartGame=function(){document.getElementById('gameoverScreen').style.display='none';startGame();}

// 渲染
function animate(){
  update();renderer.render(scene,camera);
  if(!S.gameOver){camera.position.x+=(S.playerX*0.3-camera.position.x)*0.03;camera.lookAt(S.playerX*0.2,S.playerY*0.2,-30);}
  requestAnimationFrame(animate);
}animate();

// 响应式
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
