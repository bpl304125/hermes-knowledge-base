<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>CYBER GRID — 赛博光轮</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;touch-action:none}
canvas{display:block}
#ui{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10}
#score-panel{position:absolute;top:20px;left:50%;transform:translateX(-50%);

#score-panel .label{font-size:10px;opacity:0.7;letter-spacing:2px}
#score-panel .value{font-size:28px;font-weight:bold}
#hint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,0.5);font-size:12px;text-align:center;

@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.8}}

  background:rgba(0,0,0,0.8);z-index:100;flex-direction:column;gap:20px}

  letter-spacing:4px;margin:0}

#overlay .btn{pointer-events:auto;background:transparent;border:2px solid #0ff;
  color:#0ff;padding:12px 40px;font-size:20px;cursor:pointer;
  font-family:'Courier New',monospace;letter-spacing:2px;
  transition:all 0.3s;text-transform:uppercase}
#overlay .btn:hover{background:#0ff;color:#000;box-shadow:0 0 30px #0ff}
#overlay .btn:active{transform:scale(0.95)}
#overlay .final-score{color:#f0f;font-size:24px;text-shadow:0 0 15px #f0f}
#speed-indicator{position:absolute;top:20px;right:20px;color:#0f0;font-size:12px;
  opacity:0.6;letter-spacing:1px}
</style>
</head>
<body>

<div id="ui">
  <div id="score-panel">
    <div class="label">CYBER GRID</div>
    <div class="value" id="score">0</div>
  </div>
  <div id="speed-indicator">SPD 1.0x</div>
</div>

<div id="overlay">
  <h1>CYBER GRID</h1>
  <div class="sub">赛 博 光 轮</div>
  <button class="btn" id="start-btn">START GAME</button>
  <div id="final-score" style="display:none"></div>
  <div id="hint" style="position:static;animation:none;margin-top:10px">
    ← → ↑ ↓  /  WASD  ·  SURVIVE
  </div>
</div>

<script type="module">
import * as THREE from 'three';

// === CONFIG ===
const GRID_SIZE = 20;
const CELL_SIZE = 2;
const MOVE_INTERVAL_BASE = 0.15; // seconds per move at speed 1
const AI_COUNT = 3;
const ORB_COUNT = 8;

// === GAME STATE ===
let gameState = 'menu'; // menu, playing, over
let score = 0;
let speedMultiplier = 1.0;
let moveTimer = 0;
let gameTime = 0;

// === THREE.JS SETUP ===
const renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000011, 0.00015);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 1, 200);
camera.position.set(0, 40, 30);
camera.lookAt(0, 0, 0);

// === LIGHTING ===
const ambientLight = new THREE.AmbientLight(0x111133, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(10, 30, 10);
dirLight.castShadow = true;
scene.add(dirLight);

// Neon point lights
const neonColors = [0x00ffff, 0xff00ff, 0x00ff00, 0xff6600];
const pointLights = [];
for (let i = 0; i < 4; i++) {
  const light = new THREE.PointLight(neonColors[i], 2, 40);
  light.position.set(
    (Math.random()-0.5)*GRID_SIZE*CELL_SIZE,
    3,
    (Math.random()-0.5)*GRID_SIZE*CELL_SIZE
  );
  scene.add(light);
  pointLights.push(light);
}

// === GRID FLOOR ===
const gridGroup = new THREE.Group();
scene.add(gridGroup);

// Base floor
const floorGeo = new THREE.PlaneGeometry(GRID_SIZE*CELL_SIZE, GRID_SIZE*CELL_SIZE);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x050520,
  roughness: 0.7,
  metalness: 0.3
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
floor.position.y = -0.1;
floor.receiveShadow = true;
gridGroup.add(floor);

// Grid lines
const gridLineMat = new THREE.MeshBasicMaterial({color: 0x003344, transparent: true, opacity: 0.4});
const halfSize = (GRID_SIZE * CELL_SIZE) / 2;
for (let i = 0; i <= GRID_SIZE; i++) {
  const pos = i * CELL_SIZE - halfSize;
  // X lines
  const xLine = new THREE.Mesh(
    new THREE.BoxGeometry(GRID_SIZE*CELL_SIZE, 0.02, 0.04),
    gridLineMat
  );
  xLine.position.set(0, 0, pos);
  gridGroup.add(xLine);
  // Z lines
  const zLine = new THREE.Mesh(
    new THREE.BoxGeometry(0.04, 0.02, GRID_SIZE*CELL_SIZE),
    gridLineMat
  );
  zLine.position.set(pos, 0, 0);
  gridGroup.add(zLine);
}

// === PARTICLE SYSTEM ===
const particlesGroup = new THREE.Group();
scene.add(particlesGroup);
const particlePool = [];

function spawnParticles(x, y, z, color, count=20) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.08, 4, 4);
    const mat = new THREE.MeshBasicMaterial({color, transparent: true, opacity: 1});
    const particle = new THREE.Mesh(geo, mat);
    particle.position.set(x, y, z);
    particle.userData = {
      life: 1.0,
      decay: 0.02 + Math.random() * 0.04,
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * 6 + 2,
      vz: (Math.random() - 0.5) * 4
    };
    particlesGroup.add(particle);
    particlePool.push(particle);
  }
}

// === PLAYER ===
const playerGroup = new THREE.Group();
scene.add(playerGroup);

// Cycle body
const cycleGeo = new THREE.BoxGeometry(0.6, 0.3, 0.6);
const cycleMat = new THREE.MeshStandardMaterial({
  color: 0x00ffff,
  emissive: 0x00aaff,
  emissiveIntensity: 2,
  roughness: 0.2,
  metalness: 0.8
});
const cycle = new THREE.Mesh(cycleGeo, cycleMat);
cycle.position.y = 0.3;
cycle.castShadow = true;
playerGroup.add(cycle);

// Glow ring
const ringGeo = new THREE.TorusGeometry(0.5, 0.05, 8, 16);
const ringMat = new THREE.MeshBasicMaterial({color: 0x00ffff, transparent: true, opacity: 0.8});
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = Math.PI/2;
ring.position.y = 0.3;
playerGroup.add(ring);

// Trail glow under cycle
const trailGlowGeo = new THREE.SphereGeometry(0.4, 8, 8);
const trailGlowMat = new THREE.MeshBasicMaterial({color: 0x00ffff, transparent: true, opacity: 0.4});
const trailGlow = new THREE.Mesh(trailGlowGeo, trailGlowMat);
trailGlow.position.y = 0.05;
playerGroup.add(trailGlow);

// Player state
const player = {
  gridX: Math.floor(GRID_SIZE/2),
  gridZ: Math.floor(GRID_SIZE/2),
  dirX: 0,
  dirZ: -1, // Start moving "up" (negative Z is up in 3D)
  trail: [], // Array of {x, z} grid positions
  alive: true
};

function playerWorldPos() {
  const half = GRID_SIZE * CELL_SIZE / 2;
  return {
    x: player.gridX * CELL_SIZE - half + CELL_SIZE/2,
    z: player.gridZ * CELL_SIZE - half + CELL_SIZE/2
  };
}

function updatePlayerPosition() {
  const pos = playerWorldPos();
  playerGroup.position.set(pos.x, 0, pos.z);
}

// === TRAILS (walls) ===
const trailsGroup = new THREE.Group();
scene.add(trailsGroup);

function addTrailBlock(gridX, gridZ, color=0x00aaff) {
  const geo = new THREE.BoxGeometry(CELL_SIZE*0.9, 0.5, CELL_SIZE*0.9);
  const mat = new THREE.MeshStandardMaterial({
    color,
    emissive: color,
    emissiveIntensity: 0.8,
    roughness: 0.3,
    metalness: 0.5
  });
  const block = new THREE.Mesh(geo, mat);
  const half = GRID_SIZE * CELL_SIZE / 2;
  block.position.set(
    gridX * CELL_SIZE - half + CELL_SIZE/2,
    0.3,
    gridZ * CELL_SIZE - half + CELL_SIZE/2
  );
  block.receiveShadow = true;
  block.castShadow = true;
  trailsGroup.add(block);
}

// === AI OPPONENTS ===
const aiGroup = new THREE.Group();
scene.add(aiGroup);

const aiColors = [0xff00ff, 0xff6600, 0xffff00];
const aiOpponents = [];

function createAIMesh(color) {
  const g = new THREE.Group();
  const bodyGeo = new THREE.BoxGeometry(0.5, 0.25, 0.5);
  const bodyMat = new THREE.MeshStandardMaterial({
    color, emissive: color, emissiveIntensity: 1.5,
    roughness: 0.2, metalness: 0.8
  });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.3;
  g.add(body);
  const dotGeo = new THREE.SphereGeometry(0.15, 6, 6);
  const dot = new THREE.Mesh(dotGeo, new THREE.MeshBasicMaterial({color}));
  dot.position.y = 0.6;
  g.add(dot);
  return g;
}

function initAI() {
  // Clear existing
  while(aiGroup.children.length > 0) aiGroup.remove(aiGroup.children[0]);
  aiOpponents.length = 0;
  
  for (let i = 0; i < AI_COUNT; i++) {
    const color = aiColors[i % aiColors.length];
    const mesh = createAIMesh(color);
    aiGroup.add(mesh);
    
    // Start AI at corners
    let sx, sz, dx, dz;
    if (i === 0) { sx = 1; sz = 1; dx = 1; dz = 0; }
    else if (i === 1) { sx = GRID_SIZE-2; sz = GRID_SIZE-2; dx = -1; dz = 0; }
    else { sx = 1; sz = GRID_SIZE-2; dx = 0; dz = -1; }
    
    const ai = {
      gridX: sx, gridZ: sz,
      dirX: dx, dirZ: dz,
      trail: [],
      alive: true,
      mesh,
      color,
      moveTimer: 0,
      moveInterval: MOVE_INTERVAL_BASE * (1.2 + Math.random() * 0.3)
    };
    
    const half = GRID_SIZE * CELL_SIZE / 2;
    mesh.position.set(
      sx * CELL_SIZE - half + CELL_SIZE/2, 0,
      sz * CELL_SIZE - half + CELL_SIZE/2
    );
    
    aiOpponents.push(ai);
  }
}

function updateAIPositions() {
  const half = GRID_SIZE * CELL_SIZE / 2;
  for (const ai of aiOpponents) {
    if (!ai.alive) { ai.mesh.visible = false; continue; }
    ai.mesh.position.set(
      ai.gridX * CELL_SIZE - half + CELL_SIZE/2, 0,
      ai.gridZ * CELL_SIZE - half + CELL_SIZE/2
    );
    ai.mesh.rotation.y += 0.05;
  }
}

// === ORBS (collectibles) ===
const orbsGroup = new THREE.Group();
scene.add(orbsGroup);
const orbs = [];

function createOrb(x, z) {
  const geo = new THREE.OctahedronGeometry(0.3, 0);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xffdd00,
    emissive: 0xffaa00,
    emissiveIntensity: 2,
    roughness: 0.1,
    metalness: 0.9
  });
  const orb = new THREE.Mesh(geo, mat);
  const half = GRID_SIZE * CELL_SIZE / 2;
  orb.position.set(x*CELL_SIZE-half+CELL_SIZE/2, 0.8, z*CELL_SIZE-half+CELL_SIZE/2);
  orb.userData = { gridX: x, gridZ: z, collected: false };
  orbsGroup.add(orb);
  orbs.push(orb);
}

function spawnOrbs() {
  // Clear
  while(orbsGroup.children.length > 0) orbsGroup.remove(orbsGroup.children[0]);
  orbs.length = 0;
  
  for (let i = 0; i < ORB_COUNT; i++) {
    let x, z;
    do {
      x = 2 + Math.floor(Math.random() * (GRID_SIZE - 4));
      z = 2 + Math.floor(Math.random() * (GRID_SIZE - 4));
    } while (
      (x === player.gridX && z === player.gridZ) ||
      aiOpponents.some(a => a.gridX === x && a.gridZ === z)
    );
    createOrb(x, z);
  }
}

// === AUDIO (Web Audio) ===
let audioCtx = null;
function initAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch(e) { /* silent */ }
}

function playBeep(freq=440, duration=0.08, type='square', vol=0.1) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) { /* ignore */ }
}

function playCollectSound() {
  playBeep(880, 0.1, 'sine', 0.12);
  setTimeout(() => playBeep(1320, 0.1, 'sine', 0.1), 60);
}

function playDeathSound() {
  playBeep(150, 0.3, 'sawtooth', 0.15);
  setTimeout(() => playBeep(80, 0.4, 'sawtooth', 0.12), 150);
}

function playMoveSound() {
  playBeep(220 + score * 2, 0.04, 'square', 0.04);
}

// === INPUT ===
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (gameState === 'menu' && (e.key === 'Enter' || e.key === ' ')) startGame();
  if (gameState === 'over' && (e.key === 'Enter' || e.key === ' ')) restartGame();
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch swipe
let touchStartX = 0, touchStartY = 0;
window.addEventListener('touchstart', e => {
  if (e.target.tagName === 'BUTTON') return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});
window.addEventListener('touchend', e => {
  if (gameState !== 'playing') return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (Math.max(absDx, absDy) < 20) return;
  if (absDx > absDy) {
    changeDirection(dx > 0 ? 1 : -1, 0);
  } else {
    changeDirection(0, dy > 0 ? 1 : -1);
  }
});

// Click to start/restart
document.getElementById('start-btn').addEventListener('click', () => {
  if (gameState === 'menu') startGame();
  else if (gameState === 'over') restartGame();
});

// === GAME LOGIC ===
function changeDirection(dx, dz) {
  // Can't reverse
  if (dx === -player.dirX && dz === -player.dirZ && player.trail.length > 0) return;
  // Can't stay still
  if (dx === 0 && dz === 0) return;
  player.dirX = dx;
  player.dirZ = dz;
}

function processInput() {
  if (keys['ArrowUp'] || keys['w'] || keys['W']) changeDirection(0, -1);
  else if (keys['ArrowDown'] || keys['s'] || keys['S']) changeDirection(0, 1);
  else if (keys['ArrowLeft'] || keys['a'] || keys['A']) changeDirection(-1, 0);
  else if (keys['ArrowRight'] || keys['d'] || keys['D']) changeDirection(1, 0);
}

function isOccupied(gx, gz) {
  // Check boundaries
  if (gx < 0 || gx >= GRID_SIZE || gz < 0 || gz >= GRID_SIZE) return true;
  // Check player trail
  if (player.trail.some(t => t.x === gx && t.z === gz)) return true;
  // Check AI trails
  for (const ai of aiOpponents) {
    if (ai.trail.some(t => t.x === gx && t.z === gz)) return true;
  }
  // Check AI positions
  for (const ai of aiOpponents) {
    if (ai.alive && ai.gridX === gx && ai.gridZ === gz) return true;
  }
  return false;
}

function movePlayer() {
  if (!player.alive) return;
  
  const nextX = player.gridX + player.dirX;
  const nextZ = player.gridZ + player.dirZ;
  
  // Add current position to trail
  player.trail.push({x: player.gridX, z: player.gridZ});
  addTrailBlock(player.gridX, player.gridZ, 0x00aaff);
  
  // Check if next position is occupied
  if (isOccupied(nextX, nextZ)) {
    player.alive = false;
    gameOver();
    return;
  }
  
  player.gridX = nextX;
  player.gridZ = nextZ;
  updatePlayerPosition();
  
  // Check orb collection
  for (const orb of orbs) {
    if (orb.userData.collected) continue;
    if (orb.userData.gridX === player.gridX && orb.userData.gridZ === player.gridZ) {
      orb.userData.collected = true;
      orb.visible = false;
      score += 100 * Math.floor(speedMultiplier);
      speedMultiplier = Math.min(speedMultiplier + 0.03, 3.0);
      document.getElementById('speed-indicator').textContent = `SPD ${speedMultiplier.toFixed(1)}x`;
      spawnParticles(orb.position.x, orb.position.y, orb.position.z, 0xffdd00, 15);
      playCollectSound();
      
      // Check if all orbs collected
      if (orbs.every(o => o.userData.collected)) {
        // Respawn orbs
        spawnOrbs();
        score += 500;
      }
    }
  }
  
  score += Math.floor(10 * speedMultiplier);
  document.getElementById('score').textContent = score;
  playMoveSound();
  
  // Camera shake on high speed
  if (speedMultiplier > 2) {
    camera.position.x += (Math.random() - 0.5) * 0.3;
    camera.position.z += (Math.random() - 0.5) * 0.3;
  }
}

function aiMove(ai) {
  if (!ai.alive) return;
  
  // Add current to trail
  ai.trail.push({x: ai.gridX, z: ai.gridZ});
  addTrailBlock(ai.gridX, ai.gridZ, ai.color);
  
  // Decide direction
  const possibleMoves = [
    {dx: 1, dz: 0}, {dx: -1, dz: 0}, {dx: 0, dz: 1}, {dx: 0, dz: -1}
  ].filter(m => {
    // Can't reverse
    if (m.dx === -ai.dirX && m.dz === -ai.dirZ && ai.trail.length > 0) return false;
    const nx = ai.gridX + m.dx;
    const nz = ai.gridZ + m.dz;
    if (nx < 0 || nx >= GRID_SIZE || nz < 0 || nz >= GRID_SIZE) return false;
    if (ai.trail.some(t => t.x === nx && t.z === nz)) return false;
    if (player.trail.some(t => t.x === nx && t.z === nz)) return false;
    for (const other of aiOpponents) {
      if (other === ai) continue;
      if (other.trail.some(t => t.x === nx && t.z === nz)) return false;
      if (other.alive && other.gridX === nx && other.gridZ === nz) return false;
    }
    if (player.alive && player.gridX === nx && player.gridZ === nz) return false;
    return true;
  });
  
  if (possibleMoves.length === 0) {
    ai.alive = false;
    spawnParticles(ai.mesh.position.x, ai.mesh.position.y, ai.mesh.position.z, ai.color, 20);
    playDeathSound();
    return;
  }
  
  // Prefer moving toward open space (simple heuristic)
  const move = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
  ai.dirX = move.dx;
  ai.dirZ = move.dz;
  ai.gridX += move.dx;
  ai.gridZ += move.dz;
  
  // Check collision with player's new position
  if (player.alive && ai.gridX === player.gridX && ai.gridZ === player.gridZ) {
    player.alive = false;
    gameOver();
  }
}

// === GAME FLOW ===
function startGame() {
  initAudio();
  gameState = 'playing';
  score = 0;
  speedMultiplier = 1.0;
  moveTimer = 0;
  gameTime = 0;
  
  // Reset player
  player.gridX = Math.floor(GRID_SIZE/2);
  player.gridZ = Math.floor(GRID_SIZE/2);
  player.dirX = 0;
  player.dirZ = -1;
  player.trail = [];
  player.alive = true;
  updatePlayerPosition();
  
  // Reset trails
  while(trailsGroup.children.length > 0) trailsGroup.remove(trailsGroup.children[0]);
  
  // Reset particles
  while(particlesGroup.children.length > 0) particlesGroup.remove(particlesGroup.children[0]);
  particlePool.length = 0;
  
  // Init AI
  initAI();
  
  // Spawn orbs
  spawnOrbs();
  
  // UI
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('score').textContent = '0';
  document.getElementById('speed-indicator').textContent = 'SPD 1.0x';
  
  // Camera reset
  camera.position.set(0, 40, 30);
  camera.lookAt(0, 0, 0);
}

function gameOver() {
  gameState = 'over';
  playDeathSound();
  spawnParticles(playerGroup.position.x, 0.5, playerGroup.position.z, 0x00ffff, 40);
  
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('final-score').style.display = 'block';
  document.getElementById('final-score').textContent = `FINAL SCORE: ${score}`;
  document.getElementById('start-btn').textContent = 'RESTART';
}

function restartGame() {
  startGame();
}

// === UPDATE LOOP ===
const clock = new THREE.Clock();

function update(dt) {
  if (gameState !== 'playing') {
    // Menu animation
    if (gameState === 'menu') {
      playerGroup.rotation.y += dt * 0.5;
      ring.rotation.z += dt * 2;
      for (const orb of orbs) orb.rotation.y += dt * 3;
    }
    return;
  }
  
  gameTime += dt;
  moveTimer += dt;
  const moveInterval = MOVE_INTERVAL_BASE / speedMultiplier;
  
  // Process input
  processInput();
  
  // Move player
  if (moveTimer >= moveInterval && player.alive) {
    moveTimer -= moveInterval;
    movePlayer();
  }
  
  // Move AI
  for (const ai of aiOpponents) {
    if (!ai.alive) continue;
    ai.moveTimer += dt;
    if (ai.moveTimer >= ai.moveInterval) {
      ai.moveTimer -= ai.moveInterval;
      aiMove(ai);
    }
  }
  updateAIPositions();
  
  // Rotate orbs
  for (const orb of orbs) {
    if (!orb.userData.collected) {
      orb.rotation.y += dt * 3;
      orb.position.y = 0.8 + Math.sin(gameTime * 3 + orb.position.x) * 0.2;
    }
  }
  
  // Animate player ring
  ring.rotation.z += dt * 5 * speedMultiplier;
  ring.scale.setScalar(1 + Math.sin(gameTime * 8) * 0.1);
  
  // Update particle pool
  for (let i = particlePool.length - 1; i >= 0; i--) {
    const p = particlePool[i];
    p.userData.life -= p.userData.decay;
    if (p.userData.life <= 0) {
      particlesGroup.remove(p);
      particlePool.splice(i, 1);
    } else {
      p.position.x += p.userData.vx * dt;
      p.position.y += p.userData.vy * dt;
      p.position.z += p.userData.vz * dt;
      p.material.opacity = p.userData.life;
      p.scale.setScalar(p.userData.life);
    }
  }
  
  // Animate point lights
  for (const light of pointLights) {
    light.intensity = 1.5 + Math.sin(gameTime * 2 + light.position.x) * 0.5;
  }
  
  // Subtle camera movement
  if (player.alive) {
    const target = playerGroup.position;
    camera.position.x += (target.x - camera.position.x) * 2 * dt;
    camera.position.z += (target.z - camera.position.z + 15) * 2 * dt;
    camera.lookAt(target.x, 0, target.z);
  }
  
  // Particle trail behind player
  if (player.alive && Math.random() < 0.4) {
    const pos = playerGroup.position;
    spawnParticles(
      pos.x + (Math.random()-0.5)*0.5,
      0.1,
      pos.z + (Math.random()-0.5)*0.5,
      0x00ffff,
      2
    );
  }
}

function render() {
  renderer.render(scene, camera);
}

function gameLoop() {
  requestAnimationFrame(gameLoop);
  const dt = Math.min(clock.getDelta(), 0.1);
  try {
    update(dt);
    render();
  } catch(e) {
    console.error('Game loop error:', e);
  }
}

// === INIT ===
updatePlayerPosition();
initAI();
spawnOrbs();

// Start rendering immediately (menu state)
gameLoop();

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

console.log('🚀 CYBER GRID 赛博光轮 — Ready. Press START or Enter.');
</script>
</body>
