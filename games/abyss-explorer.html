<script type="module">
import * as THREE from 'three';

// ═══════════ TEXTURE GENERATOR ═══════════
function createStoneTexture(w=256,h=256) {
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#3a3540';ctx.fillRect(0,0,w,h);
  // Base noise
  for(let i=0;i<800;i++){
    const x=Math.random()*w,y=Math.random()*h,r=Math.random()*6+1;
    const shade=30+Math.floor(Math.random()*30);
    ctx.fillStyle=`rgba(${shade},${shade-5},${shade-10},0.3)`;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  }
  // Mortar lines
  ctx.strokeStyle='rgba(25,22,30,0.5)';ctx.lineWidth=2;
  for(let y=0;y<h;y+=h/8){
    ctx.beginPath();ctx.moveTo(0,y+Math.random()*6-3);ctx.lineTo(w,y+Math.random()*6-3);ctx.stroke();
  }
  for(let x=0;x<w;x+=w/6){
    ctx.beginPath();ctx.moveTo(x+Math.random()*4-2,0);ctx.lineTo(x+Math.random()*4-2,h);ctx.stroke();
    // Offset vertical lines for brick pattern
    const oy=(Math.floor(x/(w/6))%2)*(h/16);
    ctx.beginPath();ctx.moveTo(x+w/12+Math.random()*3,oy);ctx.lineTo(x+w/12+Math.random()*3,h);ctx.stroke();
  }
  // Highlights
  for(let i=0;i<200;i++){
    ctx.fillStyle=`rgba(180,170,160,${Math.random()*0.15})`;
    ctx.fillRect(Math.random()*w,Math.random()*h,Math.random()*12+2,Math.random()*3+1);
  }
  const tex=new THREE.CanvasTexture(c);tex.wrapS=tex.wrapT=THREE.RepeatWrapping;tex.colorSpace=THREE.SRGBColorSpace;
  return tex;
}

function createFloorTexture(w=256,h=256) {
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#2a2830';ctx.fillRect(0,0,w,h);
  // Tiles
  const ts=w/4;
  for(let y=0;y<4;y++){
    for(let x=0;x<4;x++){
      const shade=38+Math.floor(Math.random()*15);
      ctx.fillStyle=`rgb(${shade},${shade-3},${shade-8})`;
      ctx.fillRect(x*ts+1,y*ts+1,ts-2,ts-2);
      ctx.strokeStyle='rgba(20,18,22,0.4)';ctx.lineWidth=1.5;
      ctx.strokeRect(x*ts+1,y*ts+1,ts-2,ts-2);
    }
  }
  // Wear
  for(let i=0;i<300;i++){
    ctx.fillStyle=`rgba(${Math.random()>0.5?25:50},${Math.random()>0.5?25:50},${Math.random()>0.5?20:45},0.2)`;
    ctx.fillRect(Math.random()*w,Math.random()*h,Math.random()*20+2,Math.random()*2+1);
  }
  const tex=new THREE.CanvasTexture(c);tex.wrapS=tex.wrapT=THREE.RepeatWrapping;tex.colorSpace=THREE.SRGBColorSpace;
  return tex;
}

function createParticleTex() {
  const c=document.createElement('canvas');c.width=32;c.height=32;
  const ctx=c.getContext('2d');
  const g=ctx.createRadialGradient(16,16,0,16,16,16);
  g.addColorStop(0,'rgba(255,200,100,1)');g.addColorStop(0.3,'rgba(255,150,50,0.7)');
  g.addColorStop(0.7,'rgba(255,80,20,0.1)');g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,32,32);
  const tex=new THREE.CanvasTexture(c);tex.needsUpdate=true;
  return tex;
}

function createGlowTex(color='255,180,80') {
  const c=document.createElement('canvas');c.width=64;c.height=64;
  const ctx=c.getContext('2d');
  const g=ctx.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,`rgba(${color},0.8)`);g.addColorStop(0.4,`rgba(${color},0.3)`);
  g.addColorStop(0.8,`rgba(${color},0.05)`);g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
}

// ═══════════ AUDIO ═══════════
const audio={ctx:null,init(){if(this.ctx)return;try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}},
  play(t){if(!this.ctx)return;const n=this.ctx.currentTime;const g=this.ctx.createGain();g.connect(this.ctx.destination);
    try{switch(t){
    case'step':{const o=this.ctx.createOscillator();o.type='triangle';o.frequency.setValueAtTime(90+Math.random()*50,n);o.frequency.exponentialRampToValueAtTime(40,n+0.07);o.connect(g);g.gain.setValueAtTime(0.04,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.08);o.start(n);o.stop(n+0.08);break}
    case'collect':{[523,659,784].forEach((f,i)=>{const o=this.ctx.createOscillator();o.type='sine';o.frequency.value=f;o.connect(g);g.gain.setValueAtTime(0,n+i*0.07);g.gain.linearRampToValueAtTime(0.12,n+i*0.07+0.03);g.gain.exponentialRampToValueAtTime(0.001,n+i*0.07+0.25);o.start(n+i*0.07);o.stop(n+i*0.07+0.25)})}break}
    case'key':{const o=this.ctx.createOscillator();o.type='triangle';o.frequency.setValueAtTime(880,n);o.frequency.setValueAtTime(1100,n+0.08);o.frequency.setValueAtTime(1320,n+0.16);o.connect(g);g.gain.setValueAtTime(0.15,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.3);o.start(n);o.stop(n+0.3);break}
    case'hit':{const b=this.ctx.createBuffer(1,this.ctx.sampleRate*0.12,this.ctx.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(this.ctx.sampleRate*0.02));const s=this.ctx.createBufferSource();s.buffer=b;s.connect(g);g.gain.setValueAtTime(0.15,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.12);s.start(n);break}
    case'hurt':{const o=this.ctx.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(150,n);o.frequency.exponentialRampToValueAtTime(40,n+0.35);o.connect(g);g.gain.setValueAtTime(0.2,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.35);o.start(n);o.stop(n+0.35);break}
    case'roll':{const b=this.ctx.createBuffer(1,this.ctx.sampleRate*0.25,this.ctx.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(this.ctx.sampleRate*0.06));const s=this.ctx.createBufferSource();s.buffer=b;s.connect(g);g.gain.setValueAtTime(0.12,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.25);s.start(n);break}
    case'exit':{[523,659,784,1047].forEach((f,i)=>{const o=this.ctx.createOscillator();o.type='sine';o.frequency.value=f;o.connect(g);g.gain.setValueAtTime(0,n+i*0.1);g.gain.linearRampToValueAtTime(0.12,n+i*0.1+0.04);g.gain.exponentialRampToValueAtTime(0.001,n+i*0.1+0.35);o.start(n+i*0.1);o.stop(n+i*0.1+0.35)})}break}
    }}catch(e){}}
};

// ═══════════ DUNGEON GENERATOR ═══════════
class Dungeon{
  constructor(floor){this.size=Math.min(18+floor*2,28);this.grid=[];this.rooms=[];this.cs=4;this.floor=floor;this.startPos=null;this.exitPos=null;this.keyPos=null}
  generate(){
    const S=this.size;this.grid=Array.from({length:S},()=>Array(S).fill(1));this.rooms=[];
    const rc=5+Math.floor(Math.random()*5);
    for(let i=0;i<rc;i++){let placed=false;
      for(let a=0;a<80&&!placed;a++){
        const rw=3+Math.floor(Math.random()*4),rh=3+Math.floor(Math.random()*4);
        const rx=1+Math.floor(Math.random()*(S-rw-2)),ry=1+Math.floor(Math.random()*(S-rh-2));
        let ol=false;
        for(let x=rx-1;x<rx+rw+1&&!ol;x++)for(let y=ry-1;y<ry+rh+1&&!ol;y++)
          if(x>=0&&x<S&&y>=0&&y<S&&this.grid[y][x]===0)ol=true;
        if(!ol){for(let x=rx;x<rx+rw;x++)for(let y=ry;y<ry+rh;y++)this.grid[y][x]=0;
          this.rooms.push({x:rx,y:ry,w:rw,h:rh,cx:Math.floor(rx+rw/2),cy:Math.floor(ry+rh/2)});placed=true}
      }
    }
    for(let i=1;i<this.rooms.length;i++)this.carve(this.rooms[i-1].cx,this.rooms[i-1].cy,this.rooms[i].cx,this.rooms[i].cy);
    if(this.rooms.length>2)this.carve(this.rooms[this.rooms.length-1].cx,this.rooms[this.rooms.length-1].cy,this.rooms[0].cx,this.rooms[0].cy);
    if(this.rooms.length>=2){
      this.startPos={x:this.rooms[0].cx*this.cs+this.cs/2,z:this.rooms[0].cy*this.cs+this.cs/2};
      this.exitPos={x:this.rooms[this.rooms.length-1].cx*this.cs+this.cs/2,z:this.rooms[this.rooms.length-1].cy*this.cs+this.cs/2};
      const kr=this.rooms[Math.floor(this.rooms.length/2)];
      this.keyPos={x:kr.cx*this.cs+this.cs/2+2,z:kr.cy*this.cs+this.cs/2};
    }return this;
  }
  carve(x1,y1,x2,y2){let cx=x1,cy=y1;const S=this.size;
    while(cx!==x2){if(cx>=0&&cx<S&&cy>=0&&cy<S)this.grid[cy][cx]=0;cx+=cx<x2?1:-1}
    while(cy!==y2){if(cx>=0&&cx<S&&cy>=0&&cy<S)this.grid[cy][cx]=0;cy+=cy<y2?1:-1}
    if(x2>=0&&x2<S&&y2>=0&&y2<S)this.grid[y2][x2]=0;
  }
  getEnemySpawns(){const s=[];const S=this.size;
    for(let y=0;y<S;y++)for(let x=0;x<S;x++)if(this.grid[y][x]===0){
      const wx=x*this.cs+this.cs/2,wz=y*this.cs+this.cs/2;
      const d1=this.startPos?Math.hypot(wx-this.startPos.x,wz-this.startPos.z):99;
      if(d1>12&&Math.random()<0.06)s.push({x:wx,z:wz});}return s;
  }
  getTreasureSpawns(){const s=[];const S=this.size;
    for(let y=0;y<S;y++)for(let x=0;x<S;x++)if(this.grid[y][x]===0){
      const wx=x*this.cs+this.cs/2+(Math.random()-0.5)*2,wz=y*this.cs+this.cs/2+(Math.random()-0.5)*2;
      const d1=this.startPos?Math.hypot(wx-this.startPos.x,wz-this.startPos.z):99;
      if(d1>6&&Math.random()<0.05)s.push({x:wx,z:wz});}return s;
  }
  getTorchSpawns(){const t=[];const S=this.size,cs=this.cs;
    for(let y=1;y<S-1;y++)for(let x=1;x<S-1;x++)if(this.grid[y][x]===1){
      const adj=[[x-1,y],[x+1,y],[x,y-1],[x,y+1]].filter(([ax,ay])=>ax>=0&&ax<S&&ay>=0&&ay<S&&this.grid[ay][ax]===0);
      if(adj.length>0&&Math.random()<0.22){const wx=x*cs+cs/2,wz=y*cs+cs/2;let nx=0,nz=0;
        if(this.grid[y][x-1]===0)nx=-1;else if(this.grid[y][x+1]===0)nx=1;
        else if(this.grid[y-1]&&this.grid[y-1][x]===0)nz=-1;else if(this.grid[y+1]&&this.grid[y+1][x]===0)nz=1;
        t.push({x:wx+nx*cs/2,y:2.5,z:wz+nz*cs/2});}}return t;
  }
}

// ═══════════ PLAYER MODEL ═══════════
function createPlayerModel(){
  const g=new THREE.Group();
  const skin=new THREE.MeshStandardMaterial({color:0xd4a574,roughness:0.6});
  const armor=new THREE.MeshStandardMaterial({color:0x6b5b4f,roughness:0.4,metalness:0.6});
  const dark=new THREE.MeshStandardMaterial({color:0x3a3035,roughness:0.5});
  const leather=new THREE.MeshStandardMaterial({color:0x5c3d2e,roughness:0.7});
  const gold=new THREE.MeshStandardMaterial({color:0xcc9933,roughness:0.2,metalness:0.9,emissive:0x331100,emissiveIntensity:0.3});

  // Body (armored torso)
  const torso=new THREE.Mesh(new THREE.BoxGeometry(0.55,0.7,0.35,4,4,2),armor);torso.position.y=1.15;g.add(torso);
  // Belt
  const belt=new THREE.Mesh(new THREE.BoxGeometry(0.58,0.08,0.38),leather);belt.position.y=0.82;g.add(belt);
  const buckle=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.15,0.05),gold);buckle.position.y=0.82;buckle.position.z=0.2;g.add(buckle);

  // Head
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.22,10,8),skin);head.position.y=1.65;g.add(head);
  // Helmet
  const helmTop=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.23,0.2,10),dark);helmTop.position.y=1.8;g.add(helmTop);
  const helmVisor=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.06,0.15),gold);helmVisor.position.y=1.72;helmVisor.position.z=0.18;g.add(helmVisor);
  // Eyes (subtle glow under visor)
  const eyeL=new THREE.Mesh(new THREE.SphereGeometry(0.04,6,6),new THREE.MeshStandardMaterial({color:0xaaccff,emissive:0x334466,emissiveIntensity:0.5}));
  eyeL.position.set(-0.07,1.74,0.18);g.add(eyeL);
  const eyeR=eyeL.clone();eyeR.position.x=0.07;g.add(eyeR);

  // Arms
  const armGeo=new THREE.CylinderGeometry(0.09,0.1,0.55,8);
  const armL=new THREE.Mesh(armGeo,armor);armL.position.set(-0.35,1.25,0);g.add(armL);
  g.armL=armL;
  const armR=new THREE.Mesh(armGeo,armor);armR.position.set(0.35,1.25,0);g.add(armR);
  g.armR=armR;
  // Shoulders
  const pauldronGeo=new THREE.SphereGeometry(0.14,8,4,0,Math.PI*2,0,Math.PI/2);
  const pauldronL=new THREE.Mesh(pauldronGeo,gold);pauldronL.position.set(-0.35,1.45,0);g.add(pauldronL);
  const pauldronR=new THREE.Mesh(pauldronGeo,gold);pauldronR.position.set(0.35,1.45,0);g.add(pauldronR);

  // Sword in right hand
  const swordGrip=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,0.25,6),leather);

  blade.position.set(0.35,1.38,0.2);g.add(blade);

  // Legs
  const legGeo=new THREE.CylinderGeometry(0.1,0.11,0.55,8);
  const legL=new THREE.Mesh(legGeo,dark);legL.position.set(-0.13,0.55,0);g.add(legL);g.legL=legL;
  const legR=new THREE.Mesh(legGeo,dark);legR.position.set(0.13,0.55,0);g.add(legR);g.legR=legR;
  // Boots
  const bootGeo=new THREE.BoxGeometry(0.16,0.1,0.2);
  const bootL=new THREE.Mesh(bootGeo,leather);bootL.position.set(-0.13,0.28,0.03);g.add(bootL);
  const bootR=new THREE.Mesh(bootGeo,leather);bootR.position.set(0.13,0.28,0.03);g.add(bootR);

  // Cape
  const capeGeo=new THREE.PlaneGeometry(0.5,0.8,4,4);
  const capeMat=new THREE.MeshStandardMaterial({color:0x8b1a1a,roughness:0.8,side:THREE.DoubleSide});
  const cape=new THREE.Mesh(capeGeo,capeMat);cape.position.set(0,1.3,-0.22);g.add(cape);g.cape=cape;

  g.position.y=0;
  return g;
}

// ═══════════ ENEMY MODEL ═══════════
function createEnemyModel(){
  const g=new THREE.Group();
  const bone=new THREE.MeshStandardMaterial({color:0xddd8cc,roughness:0.5});
  const darkBone=new THREE.MeshStandardMaterial({color:0xbbb5aa,roughness:0.5});
  const eyeMat=new THREE.MeshStandardMaterial({color:0xff2200,emissive:0xff0000,emissiveIntensity:1.5,roughness:0.1});

  // Skull
  const skull=new THREE.Mesh(new THREE.SphereGeometry(0.22,8,6,0,Math.PI*2,0,Math.PI*0.7),bone);
  skull.position.y=1.55;skull.scale.set(1,1.1,0.8);g.add(skull);
  // Jaw
  const jaw=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.08,0.15),darkBone);jaw.position.set(0,1.42,0.08);g.add(jaw);
  // Eyes
  const eL=new THREE.Mesh(new THREE.SphereGeometry(0.06,6,6),eyeMat);eL.position.set(-0.07,1.58,0.12);g.add(eL);
  const eR=new THREE.Mesh(new THREE.SphereGeometry(0.06,6,6),eyeMat);eR.position.set(0.07,1.58,0.12);g.add(eR);

  // Spine
  for(let i=0;i<5;i++){const v=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.06,0.08,6),bone);v.position.y=1.4-i*0.1;g.add(v)}
  // Ribs
  for(let i=0;i<4;i++){const r=new THREE.Mesh(new THREE.TorusGeometry(0.2,0.04,6,8),darkBone);r.position.y=1.15-i*0.12;r.rotation.x=Math.PI/2;g.add(r)}

  // Arms
  const armGeo=new THREE.CylinderGeometry(0.04,0.05,0.5,6);
  const aL=new THREE.Mesh(armGeo,darkBone);aL.position.set(-0.25,1.1,0);aL.rotation.z=0.3;g.add(aL);g.armL=aL;
  const aR=new THREE.Mesh(armGeo,darkBone);aR.position.set(0.25,1.1,0);aR.rotation.z=-0.3;g.add(aR);g.armR=aR;

  // Pelvis
  const pelvis=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.1,0.15),bone);pelvis.position.y=0.75;g.add(pelvis);

  // Legs
  const legGeo=new THREE.CylinderGeometry(0.05,0.06,0.55,6);
  const lL=new THREE.Mesh(legGeo,darkBone);lL.position.set(-0.1,0.45,0);g.add(lL);g.legL=lL;
  const lR=new THREE.Mesh(legGeo,darkBone);lR.position.set(0.1,0.45,0);g.add(lR);g.legR=lR;

  // Shadow particles (attached)
  const shadowGeo=new THREE.SphereGeometry(0.35,8,6);
  const shadowMat=new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.3,depthWrite:false});
  const shadow=new THREE.Mesh(shadowGeo,shadowMat);shadow.position.y=0.3;g.add(shadow);
  g.shadow=shadow;

  return g;
}

// ═══════════ GAME ═══════════
const G = {
  scene:null,camera:null,renderer:null,
  state:'menu',clock:null,
  dungeon:null,player:null,playerModel:null,
  health:3,maxHealth:3,score:0,floor:1,hasKey:false,
  enemies:[],treasures:[],torches:[],walls:[],particles:[],
  keyMesh:null,exitMesh:null,exitLight:null,
  cameraYaw:Math.PI,cameraPitch:0.4,cameraDist:5,targetCamDist:5,
  moveF:false,moveB:false,moveL:false,moveR:false,
  attackCD:0,hurtCD:0,rollCD:0,rollTimer:0,stepTimer:0,
  keys:{},mouseDown:false,mouseX:0,mouseY:0,
  stoneTex:null,floorTex:null,particleTex:null,

  init(){
    this.scene=new THREE.Scene();

    this.clock=new THREE.Clock();

    // Textures

    this.minimapCtx=document.getElementById('minimap').getContext('2d');

    // Input
    window.addEventListener('keydown',e=>this.onKey(e,true));
    window.addEventListener('keyup',e=>this.onKey(e,false));
    window.addEventListener('mousedown',e=>{if(e.button===0&&this.state==='playing'){this.mouseDown=true;this.attack()}});
    window.addEventListener('mouseup',e=>{if(e.button===0)this.mouseDown=false});
    window.addEventListener('mousemove',e=>this.onMouseMove(e));
    window.addEventListener('wheel',e=>this.onWheel(e));

    // Mobile
    ['m-f','m-l','m-r'].forEach(id=>{const el=document.getElementById(id);if(!el)return;
      el.addEventListener('pointerdown',e=>{e.preventDefault();if(id==='m-f')this.moveF=true;if(id==='m-l')this.moveL=true;if(id==='m-r')this.moveR=true;this.mouseDown=true});
      el.addEventListener('pointerup',e=>{if(id==='m-f')this.moveF=false;if(id==='m-l')this.moveL=false;if(id==='m-r')this.moveR=false});
      el.addEventListener('pointerleave',e=>{if(id==='m-f')this.moveF=false;if(id==='m-l')this.moveL=false;if(id==='m-r')this.moveR=false;this.mouseDown=false});
    });

  onKey(e,down){
    if(this.state!=='playing')return;
    switch(e.code){case'KeyW':case'ArrowUp':this.moveF=down;break;case'KeyS':case'ArrowDown':this.moveB=down;break;
      case'KeyA':case'ArrowLeft':this.moveL=down;break;case'KeyD':case'ArrowRight':this.moveR=down;break;
      case'Space':if(down)this.roll();e.preventDefault();break;
      case'KeyE':if(down)this.interact();break}

  onMouseMove(e){

  start(){

    this.treasures.forEach(t=>this.scene.remove(t.mesh));

    wallMat.map.repeat.set(1,1);
    const wallGeo=new THREE.BoxGeometry(cs,cs,0.5);
    for(let y=0;y<S;y++)for(let x=0;x<S;x++)if(dg.grid[y][x]===1){
      const hasOpen=[[x-1,y],[x+1,y],[x,y-1],[x,y+1]].some(([ax,ay])=>ax>=0&&ax<S&&ay>=0&&ay<S&&dg.grid[ay][ax]===0);
      if(hasOpen){
        const w=new THREE.Mesh(wallGeo,wallMat);w.position.set(x*cs+cs/2,cs/2,y*cs+cs/2);
        w.castShadow=true;w.receiveShadow=true;this.scene.add(w);this.walls.push(w);
      }

    // FLOOR — tiled
    const ws=S*cs;

    const fm=new THREE.Mesh(floorGeo,floorMat);fm.rotation.x=-Math.PI/2;fm.position.set(ws/2,0,ws/2);fm.receiveShadow=true;
    this.scene.add(fm);this.walls.push(fm);

    // CEILING — darker
    const ceilGeo=new THREE.PlaneGeometry(ws,ws);
    const ceilMat=new THREE.MeshStandardMaterial({map:this.stoneTex,roughness:0.9,side:THREE.BackSide});
    ceilMat.map.repeat.set(S*0.5,S*0.5);
    const cm=new THREE.Mesh(ceilGeo,ceilMat);cm.rotation.x=-Math.PI/2;cm.position.set(ws/2,cs,ws/2);
    this.scene.add(cm);this.walls.push(cm);

    // PILLARS in rooms

    pillarMat.map.repeat.set(0.5,2);
    dg.rooms.forEach(r=>{
      const corners=[[r.x+1,r.y+1],[r.x+r.w-1,r.y+1],[r.x+1,r.y+r.h-1],[r.x+r.w-1,r.y+r.h-1]];

      const l=new THREE.PointLight(0xff9944,4.5,18,1.5);l.position.set(tp.x,tp.y+0.4,tp.z);l.castShadow=true;l.shadow.mapSize.set(128,128);this.scene.add(l);
      this.torches.push({mesh:m,flame,light:l,baseI:4.5,phase:Math.random()*Math.PI*2});
    });

    // KEY — glowing
    const keyGeo=new THREE.OctahedronGeometry(0.35);
    const keyMat=new THREE.MeshStandardMaterial({color:0xffdd00,emissive:0xffaa00,emissiveIntensity:1.2,roughness:0.1,metalness:0.9});
    this.keyMesh=new THREE.Mesh(keyGeo,keyMat);
    this.keyMesh.position.set(dg.keyPos.x,1.5,dg.keyPos.z);
    const keyGlow=new THREE.Sprite(new THREE.SpriteMaterial({map:createGlowTex('255,220,50'),blending:THREE.AdditiveBlending,depthWrite:false,opacity:0.6}));
    keyGlow.scale.set(2,2,1);keyGlow.position.y=0;this.keyMesh.add(keyGlow);
    this.scene.add(this.keyMesh);

    // EXIT — portal
    const exitGroup=new THREE.Group();
    // Door frame
    const frameMat=new THREE.MeshStandardMaterial({color:0x886644,roughness:0.3,metalness:0.5});
    const frameL=new THREE.Mesh(new THREE.BoxGeometry(0.25,3.2,0.3),frameMat);frameL.position.set(-0.8,1.6,0);exitGroup.add(frameL);
    const frameR=new THREE.Mesh(new THREE.BoxGeometry(0.25,3.2,0.3),frameMat);frameR.position.set(0.8,1.6,0);exitGroup.add(frameR);
    const frameT=new THREE.Mesh(new THREE.BoxGeometry(2,0.25,0.3),frameMat);frameT.position.set(0,3.1,0);exitGroup.add(frameT);
    // Portal glow
    const portalLight=new THREE.PointLight(0x4488ff,2,8);portalLight.position.set(0,1.6,0);exitGroup.add(portalLight);this.exitLight=portalLight;
    // Portal sprite
    const portalSprite=new THREE.Sprite(new THREE.SpriteMaterial({map:createGlowTex('100,180,255'),blending:THREE.AdditiveBlending,depthWrite:false,opacity:0.7}));
    portalSprite.scale.set(3,4,1);portalSprite.position.set(0,1.6,0);exitGroup.add(portalSprite);
    exitGroup.position.set(dg.exitPos.x,0,dg.exitPos.z);
    this.scene.add(exitGroup);this.exitMesh=exitGroup;

    // TREASURES — chests
    const chestGeo=new THREE.BoxGeometry(0.5,0.3,0.35);
    const chestMat=new THREE.MeshStandardMaterial({color:0x8b6914,roughness:0.3,metalness:0.7});
    const chestLidGeo=new THREE.BoxGeometry(0.55,0.12,0.38);
    const lidMat=new THREE.MeshStandardMaterial({color:0xa07818,roughness:0.3,metalness:0.7});
    dg.getTreasureSpawns().forEach(tp=>{
      const group=new THREE.Group();
      const chest=new THREE.Mesh(chestGeo,chestMat);chest.position.y=0.15;group.add(chest);
      const lid=new THREE.Mesh(chestLidGeo,lidMat);lid.position.y=0.36;group.add(lid);
      group.lid=lid;
      const band=new THREE.Mesh(new THREE.BoxGeometry(0.52,0.04,0.07),new THREE.MeshStandardMaterial({color:0xcc9933,roughness:0.1,metalness:0.9}));

      group.userData={collected:false};
      this.scene.add(group);this.treasures.push(group);

    // ENEMIES
    dg.getEnemySpawns().forEach(ep=>{

      this.enemies.push({mesh,spd:1.3+Math.random()*1.5,hp:2+Math.floor(this.floor/2),pAngle:Math.random()*Math.PI*2,pTimer:0,state:'patrol',chaseT:0,lastPos:mesh.position.clone()});

  animate(){
    requestAnimationFrame(()=>this.animate());
    try{const dt=Math.min(this.clock.getDelta(),0.12);
      if(this.state==='playing'){this.update(dt)}
      this.renderer.render(this.scene,this.camera);
    }catch(e){console.error('Loop:',e)}
  },

  update(dt){
    this.updateMovement(dt);
    this.updateCamera(dt);
    this.updateEnemies(dt);
    this.updateTorches(dt);
    this.updateTreasures(dt);
    this.updateParticles(dt);
    this.updateAnimations(dt);
    this.updateMinimap();
  },

  updateMovement(dt){
    if(this.rollTimer>0){this.rollTimer-=dt;if(this.rollTimer<=0)this.rollCD=0;return}

    const spd=5.5;
    const dir=new THREE.Vector3();
    const fwd=new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0),this.cameraYaw);
    const right=new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0),this.cameraYaw);
    if(this.moveF)dir.add(fwd);if(this.moveB)dir.sub(fwd);
    if(this.moveL)dir.sub(right);if(this.moveR)dir.add(right);

    if(dir.length()>0){
      dir.normalize();
      const np=this.player.position.clone().add(dir.clone().multiplyScalar(spd*dt));
      // Collision
      const gx=Math.floor(np.x/this.dungeon.cs),gz=Math.floor(np.z/this.dungeon.cs);
      const S=this.dungeon.grid.length;
      if(gx>=0&&gx<S&&gz>=0&&gz<S&&this.dungeon.grid[gz][gx]===0){
        this.player.position.copy(np);
        // Face movement direction
        const angle=Math.atan2(dir.x,dir.z);
        this.playerModel.rotation.y=THREE.MathUtils.lerp(this.playerModel.rotation.y,angle,0.2);
      }
      this.stepTimer+=dt;
      if(this.stepTimer>0.35){this.stepTimer=0;audio.play('step')}
    }

    // Cooldowns
    if(this.attackCD>0)this.attackCD-=dt;
    if(this.hurtCD>0)this.hurtCD-=dt;
    if(this.rollCD>0)this.rollCD-=dt;

    // Update player model
    this.playerModel.position.copy(this.player.position);
    this.playerModel.position.y=0;
  },

  roll(){
    if(this.rollCD>0||this.rollTimer>0)return;
    this.rollCD=1.5;this.rollTimer=0.4;
    const fwd=new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0),this.cameraYaw);
    const rollDist=4;
    const np=this.player.position.clone().add(fwd.multiplyScalar(rollDist));
    const gx=Math.floor(np.x/this.dungeon.cs),gz=Math.floor(np.z/this.dungeon.cs);
    const S=this.dungeon.grid.length;
    if(gx>=0&&gx<S&&gz>=0&&gz<S&&this.dungeon.grid[gz][gx]===0){
      this.player.position.copy(np);
    }
    audio.play('roll');
    this.hurtCD=0.4; // brief invuln
  },

  updateCamera(dt){
    this.cameraDist=THREE.MathUtils.lerp(this.cameraDist,this.targetCamDist,0.1);
    const ox=Math.sin(this.cameraYaw)*Math.cos(this.cameraPitch)*this.cameraDist;
    const oy=Math.sin(this.cameraPitch)*this.cameraDist+2;
    const oz=Math.cos(this.cameraYaw)*Math.cos(this.cameraPitch)*this.cameraDist;
    const tp=this.player.position.clone();tp.y+=1.6;
    const cp=new THREE.Vector3(tp.x+ox,tp.y+oy,tp.z+oz);

    // Wall collision for camera
    const rc=new THREE.Raycaster(tp,cp.clone().sub(tp).normalize(),0,this.cameraDist);
    const hits=rc.intersectObjects(this.walls,false);
    if(hits.length>0){cp.copy(hits[0].point);cp.addScaledVector(rc.ray.direction,-0.3)}

    this.camera.position.lerp(cp,0.15);
    this.camera.lookAt(tp.x,tp.y,tp.z);

    // Player lantern follows camera
    this.playerLight.position.copy(this.camera.position);
  },

  updateAnimations(dt){
    if(!this.playerModel)return;
    const moving=this.moveF||this.moveB||this.moveL||this.moveR;
    const t=Date.now()*0.008;

    if(this.rollTimer>0){
      this.playerModel.rotation.z+=dt*18;
      this.playerModel.position.y=Math.abs(Math.sin(t*3))*0.3;
      return;
    }
    this.playerModel.rotation.z=0;

    if(moving){
      this.playerModel.armL.rotation.x=Math.sin(t)*0.8-0.5;
      this.playerModel.armR.rotation.x=Math.sin(t+Math.PI)*0.8-0.5;
      this.playerModel.legL.rotation.x=Math.sin(t+Math.PI)*0.8;
      this.playerModel.legR.rotation.x=Math.sin(t)*0.8;
      this.playerModel.position.y=Math.abs(Math.sin(t*2))*0.06;
      if(this.playerModel.cape){
        this.playerModel.cape.rotation.x=Math.sin(t)*0.1+0.1;
        this.playerModel.cape.position.z=-0.22+Math.sin(t+1)*0.03;
      }
    }else{
      // Idle breathe
      this.playerModel.armL.rotation.x=THREE.MathUtils.lerp(this.playerModel.armL.rotation.x,0.1,0.1);
      this.playerModel.armR.rotation.x=THREE.MathUtils.lerp(this.playerModel.armR.rotation.x,0.1,0.1);
      this.playerModel.legL.rotation.x=THREE.MathUtils.lerp(this.playerModel.legL.rotation.x,0,0.1);
      this.playerModel.legR.rotation.x=THREE.MathUtils.lerp(this.playerModel.legR.rotation.x,0,0.1);
      this.playerModel.position.y=Math.sin(t*0.8)*0.03;
    }
  },

  updateEnemies(dt){
    const pp=this.player.position;
    this.enemies.forEach((e,i)=>{
      const ep=e.mesh.position;const dist=pp.distanceTo(ep);
      if(dist<16&&dist>0.8){e.state='chase';e.chaseT=3}
      else if(e.chaseT>0)e.chaseT-=dt;else e.state='patrol';

      let md;
      if(e.state==='chase'){md=new THREE.Vector3().subVectors(pp,ep).normalize();md.y=0}
      else{e.pTimer+=dt;if(e.pTimer>3+Math.random()*2){e.pTimer=0;e.pAngle+=(Math.random()-0.5)*Math.PI}
        md=new THREE.Vector3(Math.sin(e.pAngle),0,Math.cos(e.pAngle))}

      const spd=e.state==='chase'?e.spd:e.spd*0.35;
      const nep=ep.clone().add(md.multiplyScalar(spd*dt));
      const gx=Math.floor(nep.x/this.dungeon.cs),gz=Math.floor(nep.z/this.dungeon.cs);
      const S=this.dungeon.grid.length;
      if(gx>=0&&gx<S&&gz>=0&&gz<S&&this.dungeon.grid[gz][gx]===0)e.mesh.position.copy(nep);

      if(e.state==='chase')e.mesh.lookAt(pp.x,e.mesh.position.y,pp.z);

      // Bobbing
      e.mesh.position.y=Math.sin(Date.now()*0.005+i)*0.08;
      if(e.mesh.shadow)e.mesh.shadow.scale.setScalar(1+Math.sin(Date.now()*0.005+i)*0.15);

      // Contact damage
      if(this.hurtCD<=0&&dist<1.3)this.takeDamage();
    });
  },

  takeDamage(){
    if(this.hurtCD>0)return;this.hurtCD=1.5;this.health--;audio.play('hurt');this.updateHUD();
    const el=document.createElement('div');el.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,rgba(255,0,0,0.25),transparent 70%);z-index:5;pointer-events:none;transition:opacity 0.4s';
    document.body.appendChild(el);setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),400)},50);
    if(this.health<=0)this.gameOver();
  },

  updateTorches(dt){
    this.torches.forEach(t=>{
      t.light.intensity=t.baseI+Math.sin(Date.now()*0.012+t.phase)*0.6+Math.random()*0.3;
      if(t.flame){t.flame.scale.y=0.7+Math.random()*0.6;t.flame.scale.x=0.7+Math.random()*0.6}
    });
  },

  updateTreasures(dt){
    // Chests
    this.treasures.forEach((t,i)=>{
      if(t.userData.collected)return;
      t.rotation.y+=dt*0.3;
      if(t.lid)t.lid.rotation.x=Math.sin(Date.now()*0.003)*0.05;
      if(this.player.position.distanceTo(t.position)<1.5){
        t.userData.collected=true;this.score+=100;audio.play('collect');this.showMsg('💎 +100');this.updateHUD();
        // Scatter particles
        for(let j=0;j<8;j++){
          const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:this.particleTex,blending:THREE.AdditiveBlending,depthWrite:false,opacity:0.8}));
          sp.position.copy(t.position);sp.position.y+=0.5;
          sp.scale.set(0.2,0.2,1);sp.userData={vel:new THREE.Vector3((Math.random()-0.5)*2,Math.random()*2,(Math.random()-0.5)*2),life:0.6};
          this.scene.add(sp);this.particles.push(sp);
        }
        // Fade chest
        const fade=()=>{t.children.forEach(c=>{if(c.material){c.material=c.material.clone();c.material.transparent=true;c.material.opacity-=0.04;if(c.material.opacity<=0){this.scene.remove(t);return}}})};
        t.traverse(c=>{if(c.material){c.material=c.material.clone();c.material.transparent=true}});
        const iv=setInterval(()=>{t.children.forEach(c=>{if(c.material&&c.material.opacity>0)c.material.opacity-=0.04});if(t.children[0].material.opacity<=0){clearInterval(iv);this.scene.remove(t)}},30);
      }
    });

    // Key
    if(this.keyMesh&&!this.hasKey){
      this.keyMesh.rotation.y+=dt*2.5;
      this.keyMesh.position.y=1.5+Math.sin(Date.now()*0.005)*0.25;
      if(this.player.position.distanceTo(this.keyMesh.position)<1.8){
        this.hasKey=true;audio.play('key');this.showMsg('🔑 钥匙已获取！');this.updateHUD();
        this.scene.remove(this.keyMesh);this.keyMesh=null;
      }
    }

    // Exit
    if(this.exitMesh&&this.hasKey){
      // Portal pulse
      const s=1+Math.sin(Date.now()*0.004)*0.08;
      this.exitMesh.children.forEach(c=>{if(c.isSprite)c.scale.set(3*s,4*s,1)});
      if(this.player.position.distanceTo(this.exitMesh.position)<2.5)this.floorComplete();
    }
  },

  updateParticles(dt){
    for(let i=this.particles.length-1;i>=0;i--){
      const p=this.particles[i];p.userData.life-=dt;
      if(p.userData.life<=0){this.scene.remove(p);this.particles.splice(i,1);continue}
      p.position.add(p.userData.vel.clone().multiplyScalar(dt));
      p.userData.vel.y+=dt*2;
      p.material.opacity=p.userData.life/0.6;
      p.scale.setScalar(p.userData.life/0.6*0.3);
    }
  },

  attack(){
    if(this.attackCD>0||this.rollTimer>0)return;
    this.attackCD=0.35;audio.play('hit');
    const fwd=new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0),this.cameraYaw);
    const origin=this.player.position.clone();origin.y+=1;
    // Sword swing animation
    this.playerModel.armR.rotation.z=-2;
    setTimeout(()=>{if(this.playerModel)this.playerModel.armR.rotation.z=0},200);

    let hitAny=false;
    for(let i=this.enemies.length-1;i>=0;i--){
      if(hitAny)continue;
      const e=this.enemies[i];
      const te=new THREE.Vector3().subVectors(e.mesh.position,origin);te.y=0;
      const proj=te.dot(fwd);
      if(proj>0&&proj<3&&te.clone().sub(fwd.clone().multiplyScalar(proj)).length()<1.8){
        e.hp--;hitAny=true;
        if(e.hp<=0){this.scene.remove(e.mesh);this.enemies.splice(i,1);this.score+=200;this.showMsg('💀 +200');this.updateHUD();
          // Death particles
          for(let j=0;j<12;j++){const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:this.particleTex,blending:THREE.AdditiveBlending,depthWrite:false,opacity:0.9}));
            sp.position.copy(e.mesh.position);sp.position.y+=1;sp.scale.set(0.25,0.25,1);
            sp.userData={vel:new THREE.Vector3((Math.random()-0.5)*3,Math.random()*3,(Math.random()-0.5)*3),life:0.7};
            this.scene.add(sp);this.particles.push(sp)}
        }else{
          // Hurt flash
          e.mesh.children.forEach(c=>{if(c.material&&c.material.emissive){c.material.emissive.set(0xff0000);setTimeout(()=>{if(c.material)c.material.emissive.set(0x000000)},100)}});
        }
      }
    }

    // Screen shake for feel
    this.cameraPitch+=0.05;setTimeout(()=>{this.cameraPitch-=0.05},50);
  },

  interact(){
    // proximity-based pickup (handled in updateTreasures)
  },

  showMsg(text){
    const el=document.getElementById('msg');el.textContent=text;el.style.opacity='1';
    clearTimeout(this._mt);this._mt=setTimeout(()=>{el.style.opacity='0'},2000);
  },

  updateHUD(){
    document.getElementById('health-fill').style.width=(this.health/this.maxHealth*100)+'%';
    if(this.health<=1)document.getElementById('health-fill').style.background='linear-gradient(90deg,#881111,#cc2222)';
    else document.getElementById('health-fill').style.background='linear-gradient(90deg,#cc2222,#ff4444,#ff6644)';
    document.getElementById('score-val').textContent=this.score;
    document.getElementById('floor-val').textContent=this.floor;
    document.getElementById('key-indicator').style.opacity=this.hasKey?'1':'0.3';
  },

  updateMinimap(){
    const canvas=document.getElementById('minimap');
    if(!canvas||canvas.style.display==='none')return;
    const ctx=this.minimapCtx,w=150,h=150;
    ctx.clearRect(0,0,w,h);
    const dg=this.dungeon;if(!dg)return;
    const S=dg.grid.length,scale=w/(S*dg.cs);

    // Rooms
    ctx.fillStyle='rgba(50,45,60,0.5)';
    dg.rooms.forEach(r=>ctx.fillRect(r.x*dg.cs*scale,r.y*dg.cs*scale,r.w*dg.cs*scale,r.h*dg.cs*scale));
    // Corridors
    ctx.fillStyle='rgba(35,30,45,0.35)';
    for(let y=0;y<S;y++)for(let x=0;x<S;x++)if(dg.grid[y][x]===0&&!dg.rooms.some(r=>x>=r.x&&x<r.x+r.w&&y>=r.y&&y<r.y+r.h))
      ctx.fillRect(x*dg.cs*scale,y*dg.cs*scale,dg.cs*scale,dg.cs*scale);

    // Player
    ctx.fillStyle='#ff8833';ctx.beginPath();ctx.arc(this.player.position.x*scale,this.player.position.z*scale,3.5,0,Math.PI*2);ctx.fill();
    const fwd=new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0),this.cameraYaw);
    ctx.strokeStyle='#ff9944';ctx.lineWidth=2;ctx.beginPath();
    ctx.moveTo(this.player.position.x*scale,this.player.position.z*scale);
    ctx.lineTo((this.player.position.x+fwd.x*6)*scale,(this.player.position.z+fwd.z*6)*scale);ctx.stroke();

    // Enemies
    ctx.fillStyle='#ff3344';
    this.enemies.forEach(e=>{ctx.beginPath();ctx.arc(e.mesh.position.x*scale,e.mesh.position.z*scale,2.5,0,Math.PI*2);ctx.fill()});

    // Key
    if(this.keyMesh){ctx.fillStyle='#ffdd00';ctx.beginPath();ctx.arc(this.keyMesh.position.x*scale,this.keyMesh.position.z*scale,3,0,Math.PI*2);ctx.fill()}

    // Exit
    if(this.exitMesh){ctx.fillStyle=this.hasKey?'#44ff66':'#446688';ctx.beginPath();ctx.arc(this.exitMesh.position.x*scale,this.exitMesh.position.z*scale,3.5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#4488ff';ctx.lineWidth=1.5;ctx.stroke()}
  },

  floorComplete(){
    this.state='floorcomplete';document.body.classList.remove('playing');audio.play('exit');
    document.getElementById('fcs').textContent=this.score;
    document.getElementById('fcf').textContent=this.floor;
    document.getElementById('floorcomplete').style.display='block';
  },

  nextFloor(){
    document.getElementById('floorcomplete').style.display='none';document.body.classList.add('playing');
    this.floor++;this.hasKey=false;this.health=Math.min(this.maxHealth,this.health+1);
    this.generateFloor();this.updateHUD();this.state='playing';
  },

  gameOver(){
    this.state='gameover';document.body.classList.remove('playing');
    document.getElementById('fs').textContent=this.score;
    document.getElementById('ff').textContent=this.floor;
    document.getElementById('gameover').style.display='block';
  },

  restart(){
    this.enemies.forEach(e=>this.scene.remove(e.mesh));
    this.treasures.forEach(t=>this.scene.remove(t));
    this.torches.forEach(t=>{this.scene.remove(t.light);this.scene.remove(t.mesh);if(t.flame)this.scene.remove(t.flame)});
    this.walls.forEach(w=>this.scene.remove(w));
    this.particles.forEach(p=>this.scene.remove(p));
    if(this.keyMesh)this.scene.remove(this.keyMesh);
    if(this.exitMesh)this.scene.remove(this.exitMesh);
    if(this.exitLight)this.scene.remove(this.exitLight);
    if(this.playerModel)this.playerModel.remove(this.playerLight);
    this.enemies=[];this.treasures=[];this.torches=[];this.walls=[];this.particles=[];
    this.playerModel.visible=false;

    document.getElementById('gameover').style.display='none';
    document.getElementById('hud').style.display='none';
    document.getElementById('minimap-wrap').style.display='none';
    document.getElementById('menu').style.display='block';
    this.state='menu';
  },

  showHow(){
    alert('⚔ 深渊迷踪 Ⅱ — 操作指南\n\n🖱️ 按住鼠标拖拽 — 旋转视角\n🖱️ 滚轮 — 缩放镜头\n⌨️ WASD — 移动角色\n⌨️ 空格 — 翻滚闪避(无敌帧)\n🖱️ 左键 — 挥剑攻击\n⌨️ E — 互动拾取\n\n🎯 在地牢中找到🔑钥匙\n然后前往🚪传送门进入下一层\n收集💎宝箱获取分数\n\n💡 每层生命回复1点\n🔥 越深层越危险！')
  }
};

// ═══════════ INIT ═══════════
G.init();
window.game=G;
</script>
