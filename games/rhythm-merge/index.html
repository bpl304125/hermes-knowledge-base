<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>节奏弹幕合成 — 抖音小游戏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;touch-action:none}
canvas{display:block}
#ui{position:fixed;top:8px;left:8px;z-index:10;display:flex;gap:8px;pointer-events:none;font:bold 13px Arial}
#ui>div{background:rgba(0,0,0,.5);color:#fff;padding:4px 10px;border-radius:12px}
#start{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8)}
#start>div{background:linear-gradient(135deg,#1a0a30,#0a1a30);padding:28px 36px;border-radius:20px;text-align:center;color:#fff;border:2px solid #a4f}
#start h1{font-size:1.8em}#start p{color:#aaf;font-size:12px;margin:6px 0}
#start button{background:#a4f;color:#fff;border:none;border-radius:10px;padding:10px 28px;font:bold 15px Arial;cursor:pointer;margin:8px 4px}
.go{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.8)}
.go>div{background:#fff;padding:24px 32px;border-radius:20px;text-align:center}
.go h2{color:#e44}.go .s{font-size:1.3em;margin:8px 0}.go button{background:#a4f;color:#fff;border:none;border-radius:8px;padding:8px 24px;cursor:pointer}
</style></head>
<body>
<div id="ui"><div>⭐ <span id="score">0</span></div><div>🔥 <span id="combo">x1</span></div><div>❤️ <span id="hp">5</span></div></div>
<div id="start"><div>
<h1>🎵 节奏星海</h1>
<p>⬅️ ➡️ 点击左右移动 | 💎 收集同色合成升级</p>
<p style="font-size:10px;color:#888">节奏型弹幕+合成收集</p>
<button onclick="startGame()">🎮 开始</button>
</div></div>
<div class="go" id="gameover"><div><h2>💫 终了</h2><div class="s" id="finalScore"></div><button onclick="restartGame()">🔄</button></div></div>

<script>
const canvas=document.createElement('canvas');document.body.appendChild(canvas);
const ctx=canvas.getContext('2d');
let W,H,S={running:false,score:0,combo:1,hp:5,playerX:0,lane:0,notes:[],gems:[],particles:[],beat:0,frame:0};
const LANES=[-W*0.25,0,W*0.25];const GEM_COLORS=['#f44','#4af','#ff0','#0f0','#f0f'];

function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}resize();window.addEventListener('resize',resize);

// 音频节拍
const actx=new(window.AudioContext||window.webkitAudioContext)();
function beat(bpm=140){
 S.beat++;
 let t=actx.currentTime;
 let f=[440,554,660,880][S.beat%4];
 let o=actx.createOscillator(),g=actx.createGain();
 o.type='sine';o.frequency.value=f;
 g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
 o.connect(g);g.connect(actx.destination);o.start(t);o.stop(t+0.1);

 // 同步生成音符
 if(S.beat%2===0){
  let lane=Math.floor(Math.random()*3);
  S.notes.push({x:LANES[lane],y:-20,speed:3+Math.random()*2,lane});
 }
 // 生成宝石
 if(S.beat%4===0){
  S.gems.push({x:LANES[Math.floor(Math.random()*3)],y:-30,color:GEM_COLORS[Math.floor(Math.random()*GEM_COLORS.length)],size:10+Math.random()*8});
 }
}

function startGame(){
 S.running=true;S.score=0;S.combo=1;S.hp=5;S.playerX=LANES[1];S.lane=1;S.notes=[];S.gems=[];S.particles=[];S.frame=0;S.beat=0;
 document.getElementById('start').style.display='none';document.getElementById('gameover').style.display='none';
}
function restartGame(){startGame()}

function gameOver(){
 S.running=false;
 document.getElementById('gameover').style.display='flex';
 document.getElementById('finalScore').textContent='⭐ '+S.score+' 分 | 🔥 x'+S.combo;
}

function movePlayer(dir){
 if(!S.running)return;
 S.lane=Math.max(0,Math.min(2,S.lane+dir));
 S.playerX=LANES[S.lane];
}

function draw(){
 resize();ctx.clearRect(0,0,W,H);

 // 背景
 let bg=ctx.createLinearGradient(0,0,0,H);
 bg.addColorStop(0,'#0a0a20');bg.addColorStop(0.7,'#1a1040');bg.addColorStop(1,'#2a2050');
 ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
 // 节拍线
 ctx.strokeStyle='rgba(255,255,255,0.05)';
 for(let y=H*0.2;y<H;y+=H*0.15){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
 ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.beginPath();ctx.moveTo(0,H-50);ctx.lineTo(W,H-50);ctx.stroke();

 // 跑道
 LANES.forEach((lx,i)=>{
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.moveTo(lx+W/2,0);ctx.lineTo(lx+W/2,H);ctx.stroke();
 });

 // 音符
 for(let i=S.notes.length-1;i>=0;i--){
  let n=S.notes[i];n.y+=n.speed;
  // 判定区
  if(n.y>H-60&&n.y<H-30){
   if(S.lane===n.lane){S.combo++;S.score+=10*S.combo;spawnParticles(n.x+W/2,n.y,'#0f0',8);beat(150-Math.min(S.combo*2,50));S.notes.splice(i,1);continue}
  }
  if(n.y>H+20){S.hp--;S.combo=1;spawnParticles(n.x+W/2,H,'#f44',12);S.notes.splice(i,1);
   if(S.hp<=0)gameOver();continue}
  // 绘制
  ctx.fillStyle='#0ff';ctx.beginPath();ctx.arc(n.x+W/2,n.y,12,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(n.x+W/2,n.y,12,0,Math.PI*2);ctx.stroke();
 }

 // 宝石
 for(let i=S.gems.length-1;i>=0;i--){
  let g=S.gems[i];g.y+=2;g.x+=Math.sin(g.y*0.03+S.frame*0.1)*1.5;
  if(g.y>H-60&&g.y<H-30&&S.lane===Math.round((g.x-W/2)/(W*0.125))){
   S.score+=50;S.combo+=2;spawnParticles(g.x,g.y,g.color,15);S.gems.splice(i,1);continue;
  }
  if(g.y>H+20){S.gems.splice(i,1);continue}
  ctx.fillStyle=g.color;ctx.beginPath();ctx.arc(g.x,g.y,g.size,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.beginPath();ctx.arc(g.x-2,g.y-2,g.size*0.3,0,Math.PI*2);ctx.fill();
 }

 // 合成提示
 if(S.gems.length>0&&S.gems.filter(g=>g.color===S.gems[0].color).length>=2){
  ctx.fillStyle='rgba(255,255,0,0.15)';ctx.fillRect(0,H/2,W,30);
  ctx.fillStyle='#ff0';ctx.font='12px Arial';ctx.textAlign='center';ctx.fillText('🔥 同色宝石可合成!',W/2,H/2+20);
 }

 // 玩家
 let px=S.playerX+W/2,py=H-40;
 ctx.fillStyle='#a4f';ctx.beginPath();ctx.moveTo(px,py-15);ctx.lineTo(px-12,py+10);ctx.lineTo(px+12,py+10);ctx.closePath();ctx.fill();
 ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px,py-5,6,0,Math.PI*2);ctx.fill();

 // 粒子
 for(let i=S.particles.length-1;i>=0;i--){
  let p=S.particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.03;
  if(p.life<=0){S.particles.splice(i,1);continue}
  ctx.fillStyle=`rgba(${p.color},${p.life})`;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
 }

 // UI
 document.getElementById('score').textContent=S.score;
 document.getElementById('combo').textContent='x'+S.combo;
 document.getElementById('hp').textContent='❤️'.repeat(S.hp);

 if(S.running){S.frame++;
  if(S.frame%30===0)beat();
 }

 requestAnimationFrame(draw);
}

function spawnParticles(x,y,color,n){
 for(let i=0;i<n;i++)S.particles.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4-3,life:1,color});
}

// 控制
window.movePlayer=movePlayer;
canvas.addEventListener('click',e=>{
 let half=W/2;
 if(e.clientX<half-50)movePlayer(-1);
 else if(e.clientX>half+50)movePlayer(1);
});
document.addEventListener('keydown',e=>{
 if(e.key==='ArrowLeft'||e.key==='a')movePlayer(-1);
 if(e.key==='ArrowRight'||e.key==='d')movePlayer(1);
});

draw();
</script>
</body>
</html>
