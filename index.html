<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hermes 游戏大厅</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0a0a14,#1a1040,#0a0a14);color:#fff;font:14px Arial;min-height:100vh}
header{text-align:center;padding:30px 20px 10px}
header h1{font-size:2.5em;background:linear-gradient(90deg,#0ff,#a6f,#f0f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:glow 3s infinite}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 10px #0ff)}50%{filter:drop-shadow(0 0 30px #a6f)}}
.stats{display:flex;justify-content:center;gap:20px;margin:10px 0;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.05);padding:8px 16px;border-radius:10px;text-align:center;border:1px solid rgba(255,255,255,.1)}
.stat .num{font-size:1.5em;color:#0ff}.stat .lbl{font-size:.7em;color:#888}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:20px;max-width:1200px;margin:0 auto}
.card{background:rgba(255,255,255,.05);border-radius:12px;padding:16px;cursor:pointer;transition:.2s;border:1px solid rgba(255,255,255,.08);text-decoration:none;color:#fff}
.card:hover{background:rgba(255,255,255,.12);transform:translateY(-2px);border-color:#0ff}
.card .icon{font-size:2em;margin-bottom:6px}
.card h3{font-size:1.1em;margin-bottom:4px}
.card .tags{font-size:.7em;color:#888;margin-bottom:6px}
.card .tags span{background:rgba(0,255,255,.1);padding:2px 6px;border-radius:4px;margin:0 2px}
.card .desc{font-size:.8em;color:#aaa;line-height:1.4}
footer{text-align:center;padding:20px;color:#555;font-size:.7em}
</style></head>
<body>
<header>
<h1>🎮 Hermes 游戏大厅</h1>
<div class="stats">
<div class="stat"><div class="num">14</div><div class="lbl">游戏作品</div></div>
<div class="stat"><div class="num">46</div><div class="lbl">技术报告</div></div>
<div class="stat"><div class="num">6</div><div class="lbl">AI管线</div></div>
<div class="stat"><div class="num">916+</div><div class="lbl">AI模型</div></div>
</div>
</header>

<div class="grid" id="games"></div>

<footer>Hermes Agent · 全栈游戏开发 · 持续学习进化</footer>

<script>
const GAMES=[
{icon:'🚀',name:'Nebula Strike',tags:['3D','射击','太空'],desc:'3D星际战机，多波次敌机+BOSS战+音效',url:'games/nebula-strike/'},
{icon:'🏍️',name:'赛博跑酷',tags:['3D','跑酷','赛博朋克'],desc:'全3D赛博朋克城市跑酷，建筑/霓虹/粒子特效',url:'games/neorunner/'},
{icon:'🏙️',name:'开元筑城纪 V2',tags:['模拟经营','国风','3D'],desc:'国风城市模拟，7维资源+灾难+贸易+时代演进',url:'games/kaiyuan-city-v2/'},
{icon:'🎬',name:'星之回响动漫',tags:['动画','2D','剧场'],desc:'15分钟科幻动漫，15幕+4角色+分镜',url:'games/star-echo-anime/'},
{icon:'🎵',name:'节奏星海',tags:['音游','弹幕','合成'],desc:'音游节拍+弹幕躲避+宝石合成三合一',url:'games/rhythm-merge/'},
{icon:'🔮',name:'魔法花园',tags:['魔法','塔防','双模式'],desc:'符文战斗+花园保护双模式切换',url:'games/magic-garden/'},
{icon:'☁️',name:'蔚蓝冒险',tags:['飞行','收集','休闲'],desc:'蓝色天空收集游戏，点击飞行躲避',url:'games/sky-adventure/'},
{icon:'🦾',name:'NeoEngine',tags:['骨骼动画','音频','引擎'],desc:'14骨骼程序化动画+Web Audio音频引擎',url:'games/neoengine/'},
{icon:'🎧',name:'音效工具',tags:['音频','WebAudio','工具'],desc:'7种氛围+12种音效实时合成器',url:'games/sound-tool/'},
{icon:'🧊',name:'ComfyUI管线',tags:['ComfyUI','节点','可视化'],desc:'6条资产生成管线交互式节点图',url:'games/comfyui-pipeline/'},
{icon:'🌌',name:'Hermes Studio',tags:['全景','知识','可视化'],desc:'40知识点网格+8角色编排可视化',url:'games/hermes-studio/'},
{icon:'🎞️',name:'创世动画',tags:['动画','12分钟','短片'],desc:'12幕知识动画，从代码到世界',url:'games/genesis-anime/'},
{icon:'🏃',name:'3D跑酷',tags:['3D','跑酷','入门'],desc:'初代3D跑酷，简单躲避障碍',url:'games/3d-runner/'},
{icon:'🏗️',name:'开元筑城纪 V1',tags:['模拟经营','3D','初版'],desc:'初代城市模拟，7种建筑+基础经济',url:'games/kaiyuan-city/'},
];

let html='';
GAMES.forEach(g=>{
 html+=`<a class="card" href="${g.url}" target="_blank">
<div class="icon">${g.icon}</div>
<h3>${g.name}</h3>
<div class="tags">${g.tags.map(t=>`<span>${t}</span>`).join('')}</div>
<div class="desc">${g.desc}</div>
</a>`;
});
document.getElementById('games').innerHTML=html;
</script>
</body>
</html>
